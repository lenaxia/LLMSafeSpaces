{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: relay-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.relayRouter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.controller.inferenceRelay.router.service.type }}
  ports:
    - name: http
      port: {{ .Values.controller.inferenceRelay.router.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 4 }}
{{- end }}
