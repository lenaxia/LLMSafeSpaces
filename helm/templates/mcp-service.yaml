{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "llmsafespaces.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
{{- end }}
