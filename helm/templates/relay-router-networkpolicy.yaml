{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled .Values.networkPolicy.enabled }}
# US-42.8: NetworkPolicy isolating the relay-router.
# Gated on networkPolicy.enabled (the master toggle) for parity with the other
# chart NetworkPolicies (workspace/datastore), so operators who disable the
# policy controller stay consistent. Applies once the relay subsystem is
# enabled. Posture (post-WG-removal, worklog 0442):
#
#   - TCP 8080 ingress from workspace pods (the proxy path), the controller
#     pod (its own /metrics scrape — controller/internal/relay/health.go drives
#     fleet health into the CR status), and the API pod (the admin dashboard's
#     /metrics scrape — api/internal/handlers/relay_admin.go populates the
#     per-relay requestsToday/requests429Today/activeStreams in
#     GET /admin/relay/status). Workspace pods live in the workspace namespace
#     (defaults to the release namespace).
#   - Egress is effectively unrestricted: the router dials relays over HTTP
#     on their public IPs (the per-VM token is the auth, not the network
#     layer), needs DNS, and falls back to Zen-direct when all relays are down.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relay-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.relayRouter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Workspace pods (sandbox) → router HTTP proxy on 8080.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "llmsafespaces.workspaceNamespace" . }}
          podSelector:
            matchLabels:
              {{- include "llmsafespaces.workspacePodSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Controller pod → router /metrics scrape on 8080 (the controller reads
    # fleet health from the router).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.controllerPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # API pod → router /metrics scrape on 8080 (the admin dashboard's
    # per-relay metrics — RelayAdminHandler.scrapeRouterMetrics populates
    # requestsToday/requests429Today/activeStreams; without this rule the
    # scrape times out and those fields render as zeros). Issue #466.
    # Uses the operator-overridable apiPodLabelSelector value, matching
    # the convention used by every other API-selecting NetworkPolicy in
    # this chart (workspace-network-policy, datastore-network-policy,
    # api-network-policy) and by the sibling controller rule above.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # All egress: HTTP to relay VM public IPs (per-VM token auth), DNS, and
    # Zen-direct fallback when all relays are down.
    - {}
{{- end }}
