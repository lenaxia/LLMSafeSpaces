{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.relayRouter.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.controller.inferenceRelay.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        # Post-WG-removal (worklog 0442): no privileged sidecar, no NET_ADMIN,
        # no /dev/net/tun hostPath. The pod is PSA `restricted`-compliant.
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: relay-router
          image: {{ include "llmsafespaces.relayRouter.image" . }}
          imagePullPolicy: {{ .Values.controller.inferenceRelay.router.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: UPSTREAM_URL
              value: {{ .Values.controller.inferenceRelay.upstreamURL | quote }}
            {{- with .Values.controller.inferenceRelay.upstreamAuth }}
            {{- with .keySecret }}
            {{- if .name }}
            - name: UPSTREAM_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .name | quote }}
                  key: {{ .key | quote }}
                  optional: false
            {{- end }}
            {{- end }}
            - name: UPSTREAM_AUTH_HEADER
              value: {{ $.Values.controller.inferenceRelay.upstreamAuth.header | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.controller.inferenceRelay.router.resources | nindent 12 }}
          volumeMounts:
            - name: peer-config
              mountPath: /etc/relay-router
              readOnly: true
            # /tmp writable for any internal scratch (the router is
            # readOnlyRootFilesystem; without this the Go runtime can fail on
            # temp-file operations under load).
            - name: tmp
              mountPath: /tmp
      volumes:
        # relay-router-peers holds peers.json (topology + per-VM tokens). It is
        # created by the controller (syncPeerConfigMap) on first provision and
        # may not exist at chart-install time, so it is optional.
        - name: peer-config
          configMap:
            name: relay-router-peers
            optional: true
        - name: tmp
          emptyDir:
            medium: Memory
      {{- with .Values.controller.inferenceRelay.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.inferenceRelay.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
