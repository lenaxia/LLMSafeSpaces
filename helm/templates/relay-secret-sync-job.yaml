{{- /*
relay-secret-sync-job.yaml — Epic 26

Post-install / post-upgrade Helm hook that pushes the inference relay secret
to the Cloudflare Worker so the cluster and CF stay in sync automatically.

Rollback safety
===============
This Job runs AFTER the Helm release is committed (post-install/post-upgrade).
If the upgrade itself fails and Helm rolls back, this Job never executes —
the CF Worker still has the previous secret and the rolled-back controller
still uses the previous secret. No inconsistency.

If the Job runs but the CF API call fails (network blip, token expired, etc.):
  - The Job exits non-zero and Helm marks the release as FAILED.
  - The CF Worker still has the OLD secret (CF only writes on success).
  - The controller was already updated to use the NEW secret (from the K8s
    Secret that was applied in pre-upgrade at weight=-15).
  - This creates a brief window where new pods get the new secret but CF still
    validates the old one → 403 on inference.
  - Self-recovery: run `helm upgrade` again (or `helm rollback`). On a plain
    retry, the pre-upgrade Secret hook preserves the same generated secret
    (lookup-and-reuse pattern), the Job runs again and succeeds, sync is
    restored.

Rotation procedure
==================
To rotate the secret:
  1. helm upgrade ... --set inferenceRelaySecret=<new>  (or delete the key from
     the K8s Secret to trigger auto-generation on next upgrade)
  2. The pre-upgrade Secret hook writes the new value.
  3. This Job pushes the new value to CF.
  4. The controller restarts with the new secret.
  5. Old running workspace pods still use the old INFERENCE_RELAY_BASEURL until
     they next restart — they will get 403 from CF. The controller's next pod
     rebuild cycle (pod deletion, idle eviction, etc.) restores them.
  To force an immediate roll of all workspace pods after rotation:
    kubectl delete pod -n <ns> -l app.kubernetes.io/managed-by=llmsafespaces

Skipped when
============
- cloudflare.apiToken is empty (no credentials → Job not rendered)
- cloudflare.accountId is empty
- inferenceRelayURL is empty (relay is not enabled)
- externalSecret.create=false AND externalSecret.existingSecret="" (no Secret
  to read the relay secret from)
*/ -}}
{{- $hasCredentials := and .Values.cloudflare.apiToken .Values.cloudflare.accountId -}}
{{- $hasRelay := .Values.inferenceRelayURL -}}
{{- $hasSecret := or .Values.externalSecret.create .Values.externalSecret.existingSecret -}}
{{- if and $hasCredentials $hasRelay $hasSecret }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-relay-secret-sync-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay-secret-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Allow one retry in case of a transient CF API hiccup.
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: relay-secret-sync
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "llmsafespaces.api.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sync
          # curl is available in the standard alpine image; no custom image needed.
          image: alpine/curl:8.9.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -eu

              ACCOUNT_ID="${CF_ACCOUNT_ID}"
              WORKER="${CF_WORKER_NAME}"
              SECRET_VALUE="${RELAY_SECRET}"
              TOKEN="${CF_API_TOKEN}"

              if [ -z "${SECRET_VALUE}" ]; then
                echo "ERROR: RELAY_SECRET env var is empty — secret not generated?" >&2
                exit 1
              fi

              echo "Pushing RELAY_SECRET to CF Worker ${WORKER} (account ${ACCOUNT_ID})..."

              HTTP_STATUS=$(curl -s -o /tmp/cf_response.txt -w "%{http_code}" \
                -X PUT \
                "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER}/secrets" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"RELAY_SECRET\",\"text\":\"${SECRET_VALUE}\",\"type\":\"secret_text\"}")

              cat /tmp/cf_response.txt
              echo ""

              if [ "${HTTP_STATUS}" = "200" ] || [ "${HTTP_STATUS}" = "201" ]; then
                echo "OK: RELAY_SECRET pushed to CF Worker (HTTP ${HTTP_STATUS})"
                exit 0
              else
                echo "ERROR: CF API returned HTTP ${HTTP_STATUS}" >&2
                exit 1
              fi
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: cloudflare-api-token
            - name: CF_ACCOUNT_ID
              value: {{ .Values.cloudflare.accountId | quote }}
            - name: CF_WORKER_NAME
              value: {{ .Values.cloudflare.workerName | quote }}
            - name: RELAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: inference-relay-secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
