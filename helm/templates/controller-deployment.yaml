{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmsafespaces.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "llmsafespaces.controller.serviceAccountName" . }}
      {{- with .Values.controller.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        {{- $metricsAddr := .Values.controller.metricsAddr }}
        {{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitors.enabled }}
        {{- $metricsAddr = "0.0.0.0:8080" }}
        {{- end }}
        {{- /* US-43.19 / D20: the in-cluster API service URL the controller
               polls to drive org-level workspace suspension. When
               controller.apiServiceURL is empty the chart derives the default
               from the release name + namespace + API service port so D20 is
               functional out of the box (worklog 0372 / F1). */ -}}
        {{- $apiServiceURL := .Values.controller.apiServiceURL }}
        {{- if not $apiServiceURL }}
        {{- $apiServiceURL = printf "http://%s-api.%s.svc:%v" (include "llmsafespaces.fullname" .) .Release.Namespace .Values.api.service.port }}
        {{- end }}
        - name: manager
          image: {{ include "llmsafespaces.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.controller.containerSecurityContext | nindent 12 }}
          args:
            - --metrics-addr={{ $metricsAddr }}
            - --health-probe-bind-address={{ .Values.controller.probeAddr }}
            {{- if .Values.controller.leaderElection.enabled }}
            - --enable-leader-election=true
            {{- end }}
            {{- with .Values.controller.watchNamespaces }}
            - --watch-namespaces={{ . }}
            {{- end }}
            {{- /* G2 — workspace admission allow-lists. The controller's
                   ValidatingWebhook reads these to gate Spec.Runtime
                   image references and Spec.Storage parameters. Empty
                   allowed-image-registries means "no explicit images
                   allowed" (only RuntimeEnvironment-name references).
                */ -}}
            {{- with .Values.webhooks.allowedImageRegistries }}
            - --allowed-image-registries={{ join "," . }}
            {{- end }}
            {{- with .Values.webhooks.allowedStorageClassNames }}
            - --allowed-storage-class-names={{ join "," . }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceStorageGi" }}
            - --max-workspace-storage-gi={{ .Values.webhooks.maxWorkspaceStorageGi }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceCPUMillicores" }}
            - --max-workspace-cpu-millicores={{ .Values.webhooks.maxWorkspaceCPUMillicores }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceMemoryMi" }}
            - --max-workspace-memory-mi={{ .Values.webhooks.maxWorkspaceMemoryMi }}
            {{- end }}
            {{- if .Values.controller.inferenceRelay.enabled }}
            {{- /* Fleet enabled: workspace pods route through the in-cluster
                   relay-router (Design Principle 6, Epic 42). Post-WG-removal
                   (worklog 0442) the router reaches relay VMs over HTTP with
                   per-VM token auth, so --inference-relay-secret is omitted
                   here (the controller never sets InferenceRelaySecret in
                   fleet mode; per-VM tokens are managed by the router).
                   The URL MUST be the cross-namespace FQDN: workspace pods
                   may run in any namespace (controller watches cluster-wide
                   by default), while the relay-router Service lives in the
                   release namespace — a short name would fail to resolve
                   cross-ns. workspaceRouterURL overrides for the
                   separate-ns-router case. */}}
            - --inference-relay-url={{ .Values.controller.inferenceRelay.workspaceRouterURL | default (printf "http://relay-router.%s.svc.cluster.local:8080" .Release.Namespace) }}
            {{- end }}
            {{- if .Values.controller.inferenceRelay.enabled }}
            - --enable-inference-relay=true
            - --relay-router-url={{ .Values.controller.inferenceRelay.routerURL | default "http://relay-router:8080" }}
            - --relay-artifact-url={{ join "," .Values.controller.inferenceRelay.artifact.urls }}
            - --relay-artifact-sha256-arm64={{ .Values.controller.inferenceRelay.artifact.sha256Arm64 | required "controller.inferenceRelay.artifact.sha256Arm64 is required when inferenceRelay.enabled (the arm64 relay-proxy binary checksum — see Makefile relay-bin target)" }}
            - --relay-artifact-sha256-amd64={{ .Values.controller.inferenceRelay.artifact.sha256Amd64 | required "controller.inferenceRelay.artifact.sha256Amd64 is required when inferenceRelay.enabled (the amd64 relay-proxy binary checksum — see Makefile relay-bin target)" }}
            {{- end }}
            {{- /* 2026-06-23 cold-start optimization (item #1a): publish the
                    free-models catalog as a ConfigMap so workspace pods can
                    pre-render their relay agent-config.json before opencode
                    boots. Defaults to enabled. */}}
            {{- if hasKey .Values.controller "freeModelsRefresher" }}
            {{- if not .Values.controller.freeModelsRefresher.enabled }}
            - --enable-free-models-refresher=false
            {{- end }}
            {{- with .Values.controller.freeModelsRefresher.refreshInterval }}
            - --free-models-refresh-interval={{ . }}
            {{- end }}
            {{- with .Values.controller.freeModelsRefresher.apiURL }}
            - --free-models-api-url={{ . }}
            {{- end }}
            {{- end }}
            {{/* F1 (worklog 0372): wire --api-service-url so org-suspension is
                  functional in Helm deployments. The internal-token env below
                  authenticates the controller→API call (the endpoint fails
                  closed without it). */}}
            - --api-service-url={{ $apiServiceURL }}
            {{- /* Epic 51 S51.1: default RuntimeClass for workspace pods.
                    Set to "gvisor" when .Values.gvisor.enabled is true.
                    Empty means runc (default K8s runtime, used in dev/single-tenant). */}}
            {{- if .Values.gvisor.enabled }}
            - --default-runtime-class={{ .Values.gvisor.defaultRuntimeClass | default "gvisor" }}
            {{- end }}
            {{- /* Epic 51 S51.2: per-tenant resource quotas. Only wired when
                    any limit is > 0; the webhook registration is conditional
                    in main.go (disabled when all are 0). */}}
            {{- if hasKey .Values.webhooks "tenantQuota" }}
            {{- if gt (int .Values.webhooks.tenantQuota.maxWorkspacesPerTenant) 0 }}
            - --max-workspaces-per-tenant={{ .Values.webhooks.tenantQuota.maxWorkspacesPerTenant }}
            {{- end }}
            {{- if gt (int .Values.webhooks.tenantQuota.maxCPUMillisPerTenant) 0 }}
            - --max-cpu-millis-per-tenant={{ .Values.webhooks.tenantQuota.maxCPUMillisPerTenant }}
            {{- end }}
            {{- if gt (int .Values.webhooks.tenantQuota.maxMemoryMiPerTenant) 0 }}
            - --max-memory-mi-per-tenant={{ .Values.webhooks.tenantQuota.maxMemoryMiPerTenant }}
            {{- end }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ $metricsAddr | regexFind "[0-9]+$" | atoi }}
              protocol: TCP
            - name: probe
              containerPort: {{ .Values.controller.probeAddr | regexFind "[0-9]+$" | atoi }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.controller.webhookPort }}
              protocol: TCP
          {{- with .Values.controller.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{/* F1+F5 (worklog 0372): LLMSAFESPACES_INTERNAL_TOKEN authenticates
                 the controller→API internal org-status call. The API endpoint
                 FAILS CLOSED without it, so this env var is always wired
                 (never optional). */}}
          env:
            - name: LLMSAFESPACES_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: internal-token
            {{/* POD_NAMESPACE is read by the InferenceRelay controller's
                   reconciler to locate the relay-router peer ConfigMap and
                   per-VM token Secret in the release namespace. Without it,
                   the reconciler falls back to a hardcoded "llmsafespaces"
                   namespace which only happens to work when the chart is
                   installed under that exact name. See worklog 0464. */}}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.webhooks.enabled }}
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.webhooks.enabled }}
        - name: webhook-cert
          secret:
            secretName: {{ include "llmsafespaces.fullname" . }}-webhook-cert
            defaultMode: 0444
        {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
