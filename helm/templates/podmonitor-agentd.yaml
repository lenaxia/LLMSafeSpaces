{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitors.enabled .Values.monitoring.serviceMonitors.agentdPodMonitor.enabled }}
---
# PodMonitor scrapes workspace pods' agentd admin port (:4098/metrics).
#
# Workspace pods are created dynamically by the controller (one per
# Workspace CRD) and addressed by PodIP — they have no long-lived
# Service. A PodMonitor is therefore the correct Prometheus Operator
# resource (ServiceMonitor requires a Service). The chart's other
# ServiceMonitors (api, controller) target stable Services.
#
# The /metrics endpoint on the admin port is served unauthenticated
# (adminMux.Handle("/metrics", promhttp.Handler()) in
# cmd/workspace-agentd/main.go); the workspace NetworkPolicy is what
# restricts who can reach port 4098. Prometheus must be permitted by
# that NetworkPolicy — see helm/templates/workspace-network-policy.yaml.
#
# Metrics exposed include (US-44.8):
#   - workspace_restarts_total{workspace_id,reason}
#   - workspace_memory_bytes{workspace_id}
#   - workspace_active_sessions{workspace_id}
#   - workspace_context_tokens{workspace_id}
#   - workspace_oom_kills_total{workspace_id}
#   - llmsafespaces_agentd_gate_duration_seconds_* (gate recorder)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-agentd
  namespace: {{ default .Release.Namespace .Values.monitoring.serviceMonitors.namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentd
    {{- with .Values.monitoring.serviceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.serviceMonitors.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Workspace pods are labeled by the controller (controller/internal/
  # workspace/pod_builder.go): app=llmsafespaces, component=workspace.
  # Matching on both ensures we only scrape workspace pods, not other
  # llmsafespaces-labeled pods (api/controller run as separate Deployments).
  selector:
    matchLabels:
      app: llmsafespaces
      component: workspace
  podMetricsEndpoints:
    - port: agentd-admin
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitors.interval }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitors.scrapeTimeout }}
      # The job label is set so existing alert expressions that match
      # job=~".*agentd.*" (prometheus-rules.yaml) fire correctly.
      relabelings:
        - targetLabel: job
          replacement: {{ include "llmsafespaces.fullname" . }}-agentd
  namespaceSelector:
    any: true
{{- end }}
