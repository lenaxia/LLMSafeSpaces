{{- if and .Values.monitoring.enabled .Values.monitoring.datasources.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-grafana-datasources
  namespace: {{ default .Release.Namespace .Values.monitoring.datasources.namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    {{- with .Values.monitoring.datasources.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.datasources.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  llmsafespaces-postgres.yaml: |-
    apiVersion: 1
    datasources:
      - name: LLMSafeSpaces Postgres
        uid: {{ .Values.monitoring.datasources.postgres.uid | default "llmsafespaces-postgres" | quote }}
        type: postgres
        access: proxy
        url: {{ printf "%s:%d" .Values.postgresql.host (int .Values.postgresql.port) | quote }}
        database: {{ .Values.postgresql.database | quote }}
        user: {{ .Values.postgresql.user | quote }}
        secureJsonData:
          password: ${PG_PASSWORD}
        jsonData:
          sslmode: {{ .Values.postgresql.sslMode | default "disable" | quote }}
          postgresVersion: 1600
          timescaledb: false
        isDefault: false
        editable: false
{{- end }}
