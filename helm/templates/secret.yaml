{{- if and .Values.externalSecret.create (not .Values.externalSecret.existingSecret) -}}
{{- /*
G26 — datastore credentials must be rotation-safe AND must not preserve
the historical default value "changeme" or empty (the documented
vulnerable states in RT-4.5). Strategy:

  1. If the operator supplied an explicit value in values, use it
     verbatim. This lets them point at an external Postgres with a
     known password without surprise rotation.
  2. Else, look up the existing Secret in-cluster. If the existing
     value is non-empty AND not the historical insecure default,
     reuse it (so `helm upgrade` does not rotate the password
     unintentionally).
  3. Else (first install OR the existing value is the documented
     vulnerable default), generate a 32-char alphanumeric.

This pattern guarantees:
  - `helm template` (no cluster) renders a fresh random value but never
    "changeme"; tests assert that property.
  - `helm install` writes the random value to etcd; subsequent
    `helm upgrade` reads it back via `lookup` and emits the same value.
  - `helm upgrade` against the documented vulnerable cluster (RT-4.5
    state: `postgres-password=changeme`, `redis-password=""`) DOES
    rotate to a random value; the chart will not silently propagate
    the insecure baseline.
  - `helm.sh/resource-policy: keep` plus omitting the
    before-hook-creation deletion policy means the Secret survives
    `helm uninstall` and upgrade-rollback cycles, preserving JWT
    validity for active sessions.

The rotation behaviour is itself unit-tested: TestG26_*.
*/ -}}
{{- $secretName := include "llmsafespaces.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{- /* Values that must NEVER be propagated. Anything in these lists
       triggers re-randomisation even when the value is present in the
       live Secret. */ -}}
{{- $insecurePostgres := list "changeme" "" -}}
{{- $insecureRedis := list "" -}}

{{- /* Resolve postgres-password: explicit value > existing-not-vulnerable > generated.
       NOTE: even when the operator supplies an explicit value via
       `--set externalSecret.postgresPassword=...`, the historical
       insecure default "changeme" still triggers re-randomisation.
       This catches the case where a long-lived `helm get values`
       had `postgresPassword: changeme` baked in (the documented
       RT-4.5 state) and the operator runs `helm upgrade` without
       explicitly clearing the value. */ -}}
{{- $pgPwd := .Values.externalSecret.postgresPassword -}}
{{- if has $pgPwd $insecurePostgres -}}
  {{- $candidate := "" -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "postgres-password") -}}
    {{- $candidate = index $existing.data "postgres-password" | b64dec -}}
  {{- end -}}
  {{- if has $candidate $insecurePostgres -}}
    {{- $pgPwd = randAlphaNum 32 -}}
  {{- else -}}
    {{- $pgPwd = $candidate -}}
  {{- end -}}
{{- end -}}

{{- /* Resolve redis-password: same pattern. Empty was the prior default
       and Valkey treats empty as "no auth"; that's exactly what G26 hits.
       Anything else (including a 32-char operator-supplied value) is
       preserved verbatim across upgrades. */ -}}
{{- $redisPwd := .Values.externalSecret.redisPassword -}}
{{- if has $redisPwd $insecureRedis -}}
  {{- $candidate := "" -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "redis-password") -}}
    {{- $candidate = index $existing.data "redis-password" | b64dec -}}
  {{- end -}}
  {{- if has $candidate $insecureRedis -}}
    {{- $redisPwd = randAlphaNum 32 -}}
  {{- else -}}
    {{- $redisPwd = $candidate -}}
  {{- end -}}
{{- end -}}

{{- /* JWT secret: rotation INVALIDATES every active session. We
       deliberately reuse the existing value across upgrades unless it
       is empty (treated here as "no value yet, generate"). Operators
       who want to force-rotate can `kubectl delete secret
       llmsafespaces-credentials` between upgrades. */ -}}
{{- $jwt := .Values.externalSecret.jwtSecret -}}
{{- if not $jwt -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "jwt-secret") -}}
    {{- $jwt = index $existing.data "jwt-secret" | b64dec -}}
  {{- end -}}
  {{- if not $jwt -}}
    {{- $jwt = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}

{{- /* Master secret: used as the root KEK for admin provider credentials
       (LLMSAFESPACES_MASTER_SECRET). Like JWT, rotation invalidates all
       admin-encrypted credentials. Reuse existing value across upgrades;
       generate a 64-char hex-equivalent random on first install. */ -}}
{{- $masterSecret := .Values.externalSecret.masterSecret -}}
{{- if not $masterSecret -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "master-secret") -}}
    {{- $masterSecret = index $existing.data "master-secret" | b64dec -}}
  {{- end -}}
  {{- if not $masterSecret -}}
    {{- $masterSecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}

{{- /* Internal token (US-43.19 / D20): shared secret authenticating the
       controller→API internal org-status call. The API endpoint fails closed
       without it, and the controller must present the same value as
       X-Internal-Token. Same rotation model as jwt/master: reuse existing
       across upgrades (rotation would briefly break org-suspension polling
       until both pods restart); generate a 32-char random on first install. */ -}}
{{- $internalToken := .Values.internalToken -}}
{{- if not $internalToken -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "internal-token") -}}
    {{- $internalToken = index $existing.data "internal-token" | b64dec -}}
  {{- end -}}
  {{- if not $internalToken -}}
    {{- $internalToken = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}

{{- /* Inference relay secret: embedded as the first path segment of the CF
       Worker URL so workspace pods route free-tier inference securely:
         https://relay.safespaces.dev/<relaySecret>/responses
       Strategy: operator-supplied > existing-in-cluster > auto-generated.
       Auto-generated value is a 64-char hex string (cryptographically
       random, never ""). Reused across upgrades so running pods are not
       immediately broken after helm upgrade. Operators who want to force
       rotation can delete the key from the Secret between upgrades or pass
       --set inferenceRelaySecret=<new>; the relay-secret-sync Job then
       pushes the new value to the CF Worker automatically. */ -}}
{{- $relaySecret := .Values.inferenceRelaySecret -}}
{{- if not $relaySecret -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "inference-relay-secret") -}}
    {{- $relaySecret = index $existing.data "inference-relay-secret" | b64dec -}}
  {{- end -}}
  {{- if not $relaySecret -}}
    {{- /* randAlphaNum gives 64 chars of [A-Za-z0-9]; sufficient entropy. */ -}}
    {{- $relaySecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}

{{- /* Cloudflare API token: stored for use by the relay-secret-sync Job.
       Preserved across upgrades; only overwritten if operator passes a new
       value via --set cloudflare.apiToken=<token>. */ -}}
{{- $cfToken := .Values.cloudflare.apiToken -}}
{{- if not $cfToken -}}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "cloudflare-api-token") -}}
    {{- $cfToken = index $existing.data "cloudflare-api-token" | b64dec -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
  # The Secret is also installed as a pre-install/pre-upgrade hook so it
  # is available to the migration Job (which runs as a hook with
  # weight=-5). Weight=-15 ensures the Secret lands before the migrations
  # ConfigMap (-10) and the migration Job (-5).
  #
  # No before-hook-creation deletion policy: we explicitly want the Secret
  # to persist across upgrades (rotating jwt-secret would invalidate all
  # active sessions). hook-succeeded is also omitted for the same reason.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgres-password: {{ $pgPwd | quote }}
  redis-password: {{ $redisPwd | quote }}
  jwt-secret: {{ $jwt | quote }}
  master-secret: {{ $masterSecret | quote }}
  internal-token: {{ $internalToken | quote }}
  inference-relay-secret: {{ $relaySecret | quote }}
  {{- if $cfToken }}
  cloudflare-api-token: {{ $cfToken | quote }}
  {{- end }}
{{- end }}
