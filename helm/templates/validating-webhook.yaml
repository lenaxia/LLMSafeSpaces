{{- if .Values.webhooks.enabled }}
# ValidatingWebhookConfiguration — routes admission requests for
# runtimeenvironments AND workspaces to the controller webhook server.
#
# G2 (Epic 17): the workspaces webhook closes F1.2.1 (registry allow-list),
# F1.2.2 (status forge), F1.2.9 (storage class allow-list), and RT-6.1
# (storage size upper bound). Configuration lives on the controller
# deployment via --allowed-image-registries, --allowed-storage-class-names,
# and --max-workspace-storage-gi flags (see controller-deployment.yaml).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-validate
  labels:
    {{- include "llmsafespaces.controller.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "llmsafespaces.fullname" . }}-webhook
webhooks:
  - name: vruntimeenvironment.llmsafespaces.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    timeoutSeconds: {{ .Values.webhooks.timeoutSeconds }}
    clientConfig:
      service:
        name: {{ include "llmsafespaces.fullname" . }}-controller-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-llmsafespaces-dev-v1-runtimeenvironment
        port: 443
    rules:
      - apiGroups: ["llmsafespaces.dev"]
        apiVersions: ["v1"]
        resources: ["runtimeenvironments"]
        operations: ["CREATE", "UPDATE"]
        scope: Cluster
  - name: vworkspace.llmsafespaces.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    timeoutSeconds: {{ .Values.webhooks.timeoutSeconds }}
    clientConfig:
      service:
        name: {{ include "llmsafespaces.fullname" . }}-controller-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-llmsafespaces-dev-v1-workspace
        port: 443
    rules:
      - apiGroups: ["llmsafespaces.dev"]
        apiVersions: ["v1"]
        resources: ["workspaces"]
        operations: ["CREATE", "UPDATE"]
        scope: Namespaced
  {{- /* Epic 51 S51.2: per-tenant resource quota webhook on Pod create.
          Only rendered when any tenant quota limit is configured. */}}
  {{- if or (gt (int .Values.webhooks.tenantQuota.maxWorkspacesPerTenant) 0) (gt (int .Values.webhooks.tenantQuota.maxCPUMillisPerTenant) 0) (gt (int .Values.webhooks.tenantQuota.maxMemoryMiPerTenant) 0) }}
  - name: vpodtenantquota.llmsafespaces.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    timeoutSeconds: {{ .Values.webhooks.timeoutSeconds }}
    clientConfig:
      service:
        name: {{ include "llmsafespaces.fullname" . }}-controller-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-pod-tenant-quota
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
        scope: Namespaced
    # Only intercept workspace pods (those carrying the tenant label).
    # matchExpressions:Exists is sufficient — matchLabels with "" would
    # never match real pods (sanitizeLabelValue never produces "").
    objectSelector:
      matchExpressions:
        - key: llmsafespaces.dev/tenant
          operator: Exists
  {{- end }}
{{- end }}
