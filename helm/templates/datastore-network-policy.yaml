{{- /*
G26 — Default-deny ingress on the platform datastores (Postgres + Valkey).

Pre-fix state (Phase 4 RT-4.5): both data services ran in the platform
namespace as ClusterIP Services with no NetworkPolicy gating ingress.
The platform's default Postgres password is also "changeme" (see
secret.yaml for the rotation-safe fix). NetworkPolicies provide a
defence-in-depth layer so even if a workload in the namespace knows
the credentials, it cannot reach the datastore unless it is the API
deployment or the migration Job.

Selectors:
  - postgres: `app=postgres` (matches local/deps-postgres.yaml and the
    Bitnami postgres chart's default selector)
  - valkey: `app=valkey` (matches local/deps-valkey.yaml; for Bitnami's
    Redis chart the operator should override
    `datastore.networkPolicy.valkeyPodSelectorLabels`)

Allowed sources:
  - The API deployment (per `networkPolicy.apiPodLabelSelector`)
  - The migration Job (component=migrate label)
  - Optionally: a `frontend.deployment`-equivalent selector if the chart
    grows new in-namespace consumers later (out of scope for G26).

Operators with their own policy controllers (Cilium GlobalNetworkPolicy,
Calico, Kyverno) can opt out via `datastore.networkPolicy.enabled=false`.
This is independent of `networkPolicy.enabled`, which gates the workspace
policies; an operator may want one without the other.
*/ -}}
{{- $datastoreNP := default (dict) .Values.datastore -}}
{{- $datastoreNP = default (dict) (index $datastoreNP "networkPolicy") -}}
{{- $enabled := true -}}
{{- if hasKey $datastoreNP "enabled" -}}
  {{- $enabled = $datastoreNP.enabled -}}
{{- end -}}
{{- /* Master toggle: networkPolicy.enabled gates ALL chart-rendered
       NetworkPolicies (matches the G16 test contract). The
       datastore.networkPolicy.enabled sub-toggle lets operators keep
       workspace policies on while opting out of datastore ones. */ -}}
{{- if not .Values.networkPolicy.enabled -}}
  {{- $enabled = false -}}
{{- end -}}
{{- $pgSelector := dict "app" "postgres" -}}
{{- if hasKey $datastoreNP "postgresPodSelectorLabels" -}}
  {{- $pgSelector = $datastoreNP.postgresPodSelectorLabels -}}
{{- end -}}
{{- $vkSelector := dict "app" "valkey" -}}
{{- if hasKey $datastoreNP "valkeyPodSelectorLabels" -}}
  {{- $vkSelector = $datastoreNP.valkeyPodSelectorLabels -}}
{{- end -}}
{{- if $enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-postgres-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-network-policy
spec:
  podSelector:
    matchLabels:
      {{- toYaml $pgSelector | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow API deployment to reach Postgres on 5432.
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    # Allow migration Job (component=migrate) to reach Postgres.
    # The Job's pods carry app.kubernetes.io/component=migrate per
    # migration-job.yaml; selecting on that label scopes the rule to
    # exactly the schema-bootstrap workload.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: migrate
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.dbInit.enabled }}
    # Allow the db-init Job (component=db-init) to reach Postgres when the
    # optional bootstrap hook is enabled. The db-init pod connects as the
    # Postgres superuser to CREATE ROLE / CREATE DATABASE before the
    # migration Job runs. Without this rule the datastore NetworkPolicy
    # (default-deny ingress) silently blocks the hook pod and the install
    # stalls — exactly the failure mode the hook exists to prevent.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: db-init
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-valkey-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-network-policy
spec:
  podSelector:
    matchLabels:
      {{- toYaml $vkSelector | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    # Allow migration Job to reach Valkey (symmetric with the Postgres
    # policy above) so future Redis-flushing migrations are not silently
    # blocked by the network policy.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: migrate
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 6379
{{- end }}
