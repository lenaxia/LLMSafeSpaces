{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmsafespaces.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      # Run as the unprivileged nginx user (UID 101). The frontend
      # container's nginx listens on 8080 (not 80) so it doesn't need
      # CAP_NET_BIND_SERVICE.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: API_BASE_URL
              value: {{ .Values.frontend.apiBaseUrl | default "/api/v1" | quote }}
            {{- if .Values.turnstile.enabled }}
            # Turnstile site key — public; embedded into env.json at
            # container start (docker-entrypoint.sh) so the SPA can render
            # the widget without a build-time recompile per environment.
            - name: TURNSTILE_SITE_KEY
              value: {{ .Values.turnstile.siteKey | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
            # The entrypoint script (40-envsubst-env-json.sh) writes env.json
            # into /usr/share/nginx/html at startup. readOnlyRootFilesystem
            # blocks this even though the dir is chown'd to nginx in the image.
            # An initContainer copies the baked-in dist files to this emptyDir
            # so the entrypoint can write env.json at runtime.
            - name: nginx-html
              mountPath: /usr/share/nginx/html
      initContainers:
        - name: copy-html
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          command: ["/bin/sh", "-c", "cp -a /usr/share/nginx/html/. /html/"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-html
              mountPath: /html
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: nginx-html
          emptyDir: {}
{{- end }}
