{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRules.enabled }}
{{- $apiJob := printf "%s-api.*" (include "llmsafespaces.fullname" .) -}}
{{- $ctrlJob := printf "%s-controller.*" (include "llmsafespaces.fullname" .) -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-alerts
  namespace: {{ default .Release.Namespace .Values.monitoring.prometheusRules.namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    {{- with .Values.monitoring.prometheusRules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.prometheusRules.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  groups:
    - name: llmsafespaces.api
      rules:
        {{- /* Availability = 1 - 5xx/(total - 4xx).
              4xx are excluded because they are client errors, not
              server availability failures. Critical only — no
              warning tier. `for: 3m` approximates 3-of-5 data
              points at a 1-minute evaluation interval. */}}
        - alert: LLMSafeSpacesLowAvailability
          expr: |
            (
              1 -
              sum(rate(http_requests_total{job=~"{{ $apiJob }}",status=~"5.."}[5m]))
              /
              clamp_min(
                sum(rate(http_requests_total{job=~"{{ $apiJob }}"}[5m]))
                - sum(rate(http_requests_total{job=~"{{ $apiJob }}",status=~"4.."}[5m]))
              , 0.001)
            ) < 0.99
          for: 3m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "LLMSafeSpaces availability below 99%"
            description: >-
              Platform availability (5xx-free of server-handled requests, 4xx excluded)
              is {{ `{{ $value | humanizePercentage }}` }} — below the 99% critical threshold
              for 3 of the last 5 evaluation points. Immediate investigation required.

        - alert: LLMSafeSpacesHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{job=~"{{ $apiJob }}"}[5m])) by (le)
            ) > 5
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "LLMSafeSpaces API p99 latency above 5s"
            description: >-
              API p99 latency is {{ `{{ $value | humanizeDuration }}` }} over the last 5 minutes.

        - alert: LLMSafeSpacesHighAuthFailures
          expr: |
            sum(rate(llmsafespaces_auth_failures_total{job=~"{{ $apiJob }}"}[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "LLMSafeSpaces auth failure rate elevated"
            description: >-
              Authentication failures are occurring at {{ `{{ $value | humanize }}` }}/s.
              Check for credential rotation issues or brute-force attempts.

        - alert: LLMSafeSpacesSSEBrokerDroppingEvents
          expr: |
            sum(rate(llmsafespaces_sse_broker_dropped_events_total{job=~"{{ $apiJob }}"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "LLMSafeSpaces SSE broker is dropping events"
            description: >-
              The SSE event broker has dropped {{ `{{ $value | humanize }}` }} events/s over the
              last 5 minutes. Subscribers may not be consuming fast enough.

    - name: llmsafespaces.controller
      rules:
        - alert: LLMSafeSpacesReconciliationErrors
          expr: |
            sum(rate(llmsafespaces_reconciliation_errors_total{job=~"{{ $ctrlJob }}"}[10m])) > 0.01
          for: 10m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "LLMSafeSpaces reconciliation error rate elevated"
            description: >-
              Reconciliation errors are occurring at {{ `{{ $value | humanize }}` }}/s.
              Check controller logs for error_type breakdown.

        - alert: LLMSafeSpacesWorkspaceFailures
          expr: |
            sum(increase(llmsafespaces_workspaces_failed_total{job=~"{{ $ctrlJob }}"}[1h])) > 0
          for: 1m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "LLMSafeSpaces workspaces entering Failed state"
            description: >-
              {{ `{{ $value }}` }} workspaces entered Failed state in the last hour.
              Check reason label for root cause.

        - alert: LLMSafeSpacesWorkspaceCreationSlow
          expr: |
            histogram_quantile(0.99,
              sum(rate(llmsafespaces_workspace_create_duration_seconds_bucket{job=~"{{ $ctrlJob }}"}[15m])) by (le)
            ) > 120
          for: 10m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "LLMSafeSpaces workspace creation taking over 2 minutes (p99)"
            description: >-
              Workspace creation p99 latency is {{ `{{ $value | humanizeDuration }}` }}.
              Users may experience long waits when creating workspaces.

        - alert: LLMSafeSpacesRecoveryBackoffHigh
          expr: |
            histogram_quantile(0.99,
              sum(rate(llmsafespaces_workspace_recovery_backoff_duration_seconds_bucket{job=~"{{ $ctrlJob }}"}[15m])) by (le)
            ) > 600
          for: 15m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "LLMSafeSpaces recovery backoff duration above 10 minutes"
            description: >-
              Recovery backoff p99 is {{ `{{ $value | humanizeDuration }}` }}. Workspaces
              are taking a long time to recover from failures.

        - alert: LLMSafeSpacesSafeModeActive
          expr: |
            llmsafespaces_workspace_safe_mode_active{job=~"{{ $ctrlJob }}"} > 0
          for: 5m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "LLMSafeSpaces safe mode is active"
            description: >-
              {{ `{{ $value }}` }} workspace(s) are currently in safe mode. This indicates
              repeated failures triggering the safety threshold.

        - alert: LLMSafeSpacesHighConsecutiveFailures
          expr: |
            llmsafespaces_workspace_consecutive_failures_max{job=~"{{ $ctrlJob }}"} > 3
          for: 5m
          labels:
            severity: critical
            component: controller
          annotations:
            summary: "LLMSafeSpaces consecutive workspace failures above 3"
            description: >-
              Maximum consecutive failures is {{ `{{ $value }}` }}. One or more workspaces
              are stuck in a failure loop. Immediate investigation required.

        - alert: LLMSafeSpacesStatusUpdateConflicts
          expr: |
            sum(rate(llmsafespaces_workspace_status_update_conflicts_total{job=~"{{ $ctrlJob }}"}[5m])) > 0.1
          for: 10m
          labels:
            severity: info
            component: controller
          annotations:
            summary: "LLMSafeSpaces optimistic lock conflicts on workspace status"
            description: >-
              Status update conflicts occurring at {{ `{{ $value | humanize }}` }}/s. This
              may indicate multiple controllers or high contention.

        - alert: LLMSafeSpacesInitContainerSlow
          expr: |
            histogram_quantile(0.99,
              sum(rate(llmsafespaces_workspace_init_container_duration_seconds_bucket{job=~"{{ $ctrlJob }}"}[15m])) by (le)
            ) > 60
          for: 10m
          labels:
            severity: info
            component: controller
          annotations:
            summary: "LLMSafeSpaces workspace init container taking over 60s (p99)"
            description: >-
              Workspace setup init container p99 is {{ `{{ $value | humanizeDuration }}` }}.
              Large package installations or init scripts may be slow.

    - name: llmsafespaces.agentd
      rules:
        {{- /* llmsafespaces_agent_reload_total is emitted by the API service
              (api/internal/services/metrics/metrics.go:147), not by agentd
              pods. Use $apiJob to match. */}}
        - alert: LLMSafeSpacesAgentReloadFailures
          expr: |
            sum(rate(llmsafespaces_agent_reload_total{job=~"{{ $apiJob }}",result="error"}[5m]))
            /
            sum(rate(llmsafespaces_agent_reload_total{job=~"{{ $apiJob }}"}[5m]))
            > 0.1
          for: 5m
          labels:
            severity: warning
            component: agentd
          annotations:
            summary: "LLMSafeSpaces agent reload failure rate above 10%"
            description: >-
              {{ `{{ $value | humanizePercentage }}` }} of agent reloads are failing. Credential
              injection or agent restart may be broken.

        {{- /* llmsafespaces_agentd_gate_duration_seconds is emitted by
              workspace-agentd (cmd/workspace-agentd/gate_recorder.go).
              Scraped via the chart's PodMonitor
              (monitoring.serviceMonitors.agentdPodMonitor, default enabled)
              which targets workspace pods' agentd-admin port. Disable that
              PodMonitor and this alert goes dark. */}}
        - alert: LLMSafeSpacesAgentdSlowStartup
          expr: |
            histogram_quantile(0.95,
              sum(rate(llmsafespaces_agentd_gate_duration_seconds_bucket{job=~".*agentd.*",gate="readyz_first_200"}[15m])) by (le)
            ) > 60
          for: 10m
          labels:
            severity: warning
            component: agentd
          annotations:
            summary: "LLMSafeSpaces agentd startup taking over 60s (p95)"
            description: >-
              Agentd pods are taking {{ `{{ $value | humanizeDuration }}` }} to reach readyz=200
              at p95. Check opencode boot, provider connections, or relay injection.

        {{- /* llmsafespaces_relay_injector_total is emitted ONLY by
              workspace-agentd (cmd/workspace-agentd/relay_injector.go) — the
              API service does NOT emit it. The chart's PodMonitor
              (monitoring.serviceMonitors.agentdPodMonitor) scrapes workspace
              pods with job=<release>-agentd; matching job=~".*agentd.*" makes
              this alert fire on the pod-side data. (Pre-PodMonitor this alert
              was dead — nothing scraped workspace pods.) */}}
        - alert: LLMSafeSpacesRelayInjectorFailures
          expr: |
            sum(increase(llmsafespaces_relay_injector_total{job=~".*agentd.*",outcome=~"config_write_failed|auth_write_failed|unhealthy_timeout"}[1h])) > 0
          for: 1m
          labels:
            severity: warning
            component: agentd
          annotations:
            summary: "LLMSafeSpaces relay injector failures detected"
            description: >-
              {{ `{{ $value }}` }} relay injector failures in the last hour. Free-tier model
              routing may be broken for affected workspaces.

    - name: llmsafespaces.billing
      rules:
        - alert: LLMSafeSpacesHighInferenceCostRate
          expr: |
            sum(rate(llmsafespaces_inference_cost_dollars_total{job=~"{{ $apiJob }}"}[1h])) > 10
          for: 30m
          labels:
            severity: info
            component: billing
          annotations:
            summary: "LLMSafeSpaces inference cost rate above $10/hour"
            description: >-
              Inference spend is running at {{ `{{ $value | printf "$%.2f" }}` }}/hour averaged
              over the last hour. Review model usage patterns if unexpected.

        - alert: LLMSafeSpacesWorkspaceDiskUsageHigh
          expr: |
            (
              llmsafespaces_workspace_disk_used_bytes{job=~"{{ $ctrlJob }}"}
              /
              llmsafespaces_workspace_storage_bytes{job=~"{{ $ctrlJob }}"}
            ) > 0.9
          for: 15m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "LLMSafeSpaces workspace disk usage above 90%"
            description: >-
              Workspace {{ `{{ $labels.workspace_id }}` }} is using
              {{ `{{ $value | humanizePercentage }}` }} of its allocated storage. The PVC
              may fill up and crash the agent.

        - alert: LLMSafeSpacesLegacyAPIKeysRemaining
          expr: |
            llmsafespaces_api_key_legacy_total{job=~"{{ $ctrlJob }}"} > 0
          for: 1h
          labels:
            severity: info
            component: billing
          annotations:
            summary: "LLMSafeSpaces plaintext API keys still in use"
            description: >-
              {{ `{{ $value }}` }} API keys are still stored in plaintext (pre-migration).
              Complete the key hashing migration to eliminate this security debt.
{{- end }}
