{{- if .Values.namespace.create }}
{{- $psa := .Values.namespace.podSecurityEnforce }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    {{- if $psa }}
    # G11 (Epic 17 worklog 0091 RT-6.11): Pod Security Admission labels enforce
    # that every pod in this namespace meets the configured profile. All chart
    # pods (controller, API, frontend, MCP, migration, relay-router) comply
    # with `restricted`: runAsNonRoot, NoNewPrivs, capabilities=drop ALL,
    # seccompProfile=RuntimeDefault. Workspace pods comply via the controller's
    # pod-spec generator. (Post-WG-removal worklog 0442: relay-router no longer
    # carries a privileged WG sidecar, so the namespace can stay `restricted`
    # even when inferenceRelay is enabled.)
    pod-security.kubernetes.io/enforce: {{ $psa | quote }}
    pod-security.kubernetes.io/enforce-version: {{ .Values.namespace.podSecurityVersion | default "latest" | quote }}
    pod-security.kubernetes.io/audit: {{ $psa | quote }}
    pod-security.kubernetes.io/audit-version: {{ .Values.namespace.podSecurityVersion | default "latest" | quote }}
    pod-security.kubernetes.io/warn: {{ $psa | quote }}
    pod-security.kubernetes.io/warn-version: {{ .Values.namespace.podSecurityVersion | default "latest" | quote }}
    {{- end }}
{{- end }}
