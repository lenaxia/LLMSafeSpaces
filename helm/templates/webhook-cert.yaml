{{- if .Values.webhooks.enabled }}
# ============================================================================
# Webhook TLS — cert-manager Issuer + Certificate.
# The Certificate produces a Secret named <fullname>-webhook-cert which is
# mounted into the controller pod at /tmp/k8s-webhook-server/serving-certs
# (controller-runtime's default webhook cert dir).
# ============================================================================
{{- if not .Values.webhooks.existingIssuer }}
{{- if eq .Values.webhooks.issuerKind "Issuer" }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.controller.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- else }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-selfsigned
  labels:
    {{- include "llmsafespaces.controller.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.controller.labels" . | nindent 4 }}
spec:
  secretName: {{ include "llmsafespaces.fullname" . }}-webhook-cert
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  # SANs: webhook is reached at <service>.<namespace>.svc and ...svc.cluster.local
  dnsNames:
    - {{ include "llmsafespaces.fullname" . }}-controller-webhook
    - {{ include "llmsafespaces.fullname" . }}-controller-webhook.{{ .Release.Namespace }}
    - {{ include "llmsafespaces.fullname" . }}-controller-webhook.{{ .Release.Namespace }}.svc
    - {{ include "llmsafespaces.fullname" . }}-controller-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- if .Values.webhooks.existingIssuer }}
    name: {{ .Values.webhooks.existingIssuer }}
    {{- else }}
    name: {{ include "llmsafespaces.fullname" . }}-selfsigned
    {{- end }}
    kind: {{ .Values.webhooks.issuerKind }}
    group: cert-manager.io
{{- end }}
