{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    {{- /*
      Base annotations from values.yaml, then optionally augment the
      Content-Security-Policy with Cloudflare Turnstile domains when
      turnstile.enabled=true. Rendered as configuration-snippet for
      nginx-ingress; other ingress controllers (ALB) currently ignore
      this key, which is why the CSP wasn't observed live under the
      ALB deployment. The chart-side default MUST still be
      Turnstile-compatible so operators who switch ingress classes
      don't accidentally break the register widget.

      Two annotations to override: configuration-snippet (nginx path)
      and alb.ingress.kubernetes.io/actions.response-headers-... could
      be a future addition for the ALB path. Currently only nginx.
    */ -}}
    {{- $baseAnnotations := .Values.frontend.ingress.annotations | default dict -}}
    {{- if and .Values.turnstile.enabled (index $baseAnnotations "nginx.ingress.kubernetes.io/configuration-snippet") -}}
      {{- /* Extend CSP: allow Cloudflare Turnstile CDN + frame */ -}}
      {{- $snippet := index $baseAnnotations "nginx.ingress.kubernetes.io/configuration-snippet" -}}
      {{- $snippet = regexReplaceAll `script-src ([^;"]+)` $snippet `script-src ${1} https://challenges.cloudflare.com` -}}
      {{- $snippet = regexReplaceAll `frame-src ([^;"]+)` $snippet `frame-src ${1} https://challenges.cloudflare.com` -}}
      {{- /* If the CSP has no frame-src, append one so the widget's iframe can load. */ -}}
      {{- if not (regexMatch `frame-src` $snippet) -}}
        {{- $snippet = regexReplaceAll `(default-src [^;"]+;)` $snippet `${1} frame-src 'self' https://challenges.cloudflare.com;` -}}
      {{- end -}}
      {{- $_ := set $baseAnnotations "nginx.ingress.kubernetes.io/configuration-snippet" $snippet -}}
    {{- end }}
    {{- toYaml $baseAnnotations | nindent 4 }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" . }}-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" . }}-frontend
                port:
                  name: http
    {{- range .Values.frontend.ingress.additionalHosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" $ }}-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" $ }}-frontend
                port:
                  name: http
    {{- end }}
  {{- if .Values.frontend.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host | quote }}
      secretName: {{ .Values.frontend.ingress.tlsSecret | default (printf "%s-frontend-tls" (include "llmsafespaces.fullname" .)) }}
    {{- range .Values.frontend.ingress.additionalHosts }}
    - hosts:
        - {{ .host | quote }}
      secretName: {{ .tlsSecret | default (printf "%s-tls" (.host | replace "." "-")) }}
    {{- end }}
  {{- end }}
{{- end }}
