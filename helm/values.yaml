# Default values for llmsafespaces.
# This is a YAML-formatted file.

# nameOverride / fullnameOverride follow standard Helm conventions.
nameOverride: ""
fullnameOverride: ""

# Namespace where the platform's own components run.
# Workspaces are created in the same namespace by default; controller can be
# configured to watch additional namespaces via .controller.watchNamespaces.
namespace:
  # If create: true, the chart will create the release namespace.
  # If you install with --namespace and --create-namespace, set this to false.
  create: false
  # G11 (Epic 17): if non-empty, the chart applies Pod Security
  # Admission labels to the namespace at all three levels (enforce,
  # audit, warn). All chart-shipped pods comply with the `restricted`
  # profile. Operators can opt out by setting this to "" (empty).
  podSecurityEnforce: "restricted"
  podSecurityVersion: "latest"

# ----------------------------------------------------------------------------
# API service
# ----------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/lenaxia/llmsafespaces/api
    # Tag to deploy. Falls back to .Chart.AppVersion if empty.
    # Recommended: pin to an immutable tag like `sha-<7-char-commit>` or
    # `ts-<unix-timestamp>` published by CI. Avoid moving tags like `dev` or
    # `latest` in production — kubelet image-pull caching does not always
    # honor `imagePullPolicy: Always` for moving tags (Talos/containerd).
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL

  # See api/config/config.yaml for the full schema. The chart renders a
  # ConfigMap from these values; sensitive fields (passwords, JWT) come from
  # the secret block below or an existing secret.
  config:
    server:
      host: "0.0.0.0"
      port: 8080
      shutdownTimeout: 30s
    kubernetes:
      configPath: ""
      inCluster: true
      # Defaults to the release namespace; override to deploy workspaces
      # into a different namespace.
      namespace: ""
      leaderElection:
        enabled: true
        leaseDuration: 15s
        renewDeadline: 10s
        retryPeriod: 2s
    logging:
      level: info
      development: false
      encoding: json
    auth:
      tokenDuration: 24h
      apiKeyPrefix: "lsp_"
      # jwtIssuer / jwtAudience: iss/aud claims minted on every JWT and
      # validated on every parse. Default "llmsafespaces" is applied at API
      # boot if empty. Set when deploying multiple LLMSafeSpaces instances
      # that should not accept each other's tokens.
      jwtIssuer: ""
      jwtAudience: ""
    rateLimiting:
      enabled: true
      limits:
        default:
          requests: 1000
          window: 1h
        create_workspace:
          requests: 100
          window: 1h
        execute_code:
          requests: 500
          window: 1h

    security:
      # allowedOrigins: list of origins permitted to make cross-origin
      # requests to this API. Default is the production hostname; replace
      # with your own.
      #
      # allowCredentials: when true, the API sets
      # Access-Control-Allow-Credentials: true on CORS responses, allowing
      # authenticated cross-origin requests. The CORS spec (Fetch §3.2.1)
      # forbids AllowedOrigins=["*"] together with allowCredentials=true,
      # and the API refuses to start in that state (fail-closed guard in
      # config.validateSecurity). If you need credentials, list each
      # origin explicitly.
      allowedOrigins:
        - "https://safespace.thekao.cloud"
      allowCredentials: false

  # Liveness / readiness probes hit /livez and /readyz.
  # /livez always returns 200 if the process is responsive.
  # /readyz pings Postgres and Redis; returns 503 if either is down.
  # /health is preserved as a legacy alias for /livez.
  livenessProbe:
    httpGet:
      path: /livez
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: llmsafespaces.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ----------------------------------------------------------------------------
# Controller
# ----------------------------------------------------------------------------
controller:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/lenaxia/llmsafespaces/controller
    # Tag to deploy. Falls back to .Chart.AppVersion if empty. See api.image.tag
    # for rationale on pinning to immutable `sha-` or `ts-` tags.
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []

  # Comma-separated list of namespaces the controller should watch.
  # Wired to the controller's --watch-namespaces flag.
  #   ""       (default) — watch all namespaces (cluster-wide)
  #   "*"                — explicit form, equivalent to empty
  #   "ns1"              — watch only ns1
  #   "ns1,ns2"          — watch ns1 and ns2
  #
  # Combine with namespace-scoped RoleBindings (see rbac.scope below) for
  # defense-in-depth: even if the controller is given cluster-wide RBAC,
  # cache.DefaultNamespaces narrows what it actually reconciles.
  watchNamespaces: ""

  leaderElection:
    enabled: true

  # US-43.19 / D20: in-cluster root URL of the API service the controller polls
  # (every 30s, cached) to drive org-level workspace suspension. Empty ("")
  # derives the default in-cluster API service URL from the release name +
  # namespace. The controller's --api-service-url flag is wired from this value;
  # org-suspension is disabled (inert) only if you explicitly set this to "" AND
  # clear internalToken — by default both are wired so D20 is functional.
  apiServiceURL: ""

  # F1.4.3 (Epic 17): pre-fix the controller bound /metrics on
  # 0.0.0.0:8080, reachable from any pod with route to the controller
  # IP. The default now binds to loopback so only same-pod sidecars
  # can scrape. For Prometheus, operators should run a
  # kube-rbac-proxy sidecar that authenticates incoming scrapes and
  # forwards to 127.0.0.1:8080. Override this value to "0.0.0.0:8080"
  # if you accept the unauthenticated-metrics trade-off (e.g. trusted
  # cluster + NetworkPolicy already enforces ingress).
  metricsAddr: "127.0.0.1:8080"
  probeAddr: ":8081"
  webhookPort: 9443

  # InferenceRelay controller (Epic 42). When enabled, the controller
  # reconciles InferenceRelay CRs and manages relay VMs across cloud
  # providers. Requires the InferenceRelay CRD to be installed and
  # provider credentials (Secrets) to be present in the release namespace.
  #
  # NOTE: InferenceRelay is a cluster-scoped CRD, so enabling this feature
  # requires rbac.scope=cluster for the controller to watch/manage CRs.
  # The RBAC rules for inferencerelays + configmaps are conditionally
  # added to the cluster-scoped ClusterRole when this is enabled.
  inferenceRelay:
    enabled: false
    # URL of the in-cluster relay-router for /metrics scraping (used by the
    # CONTROLLER, which runs in this release namespace — short name is fine).
    routerURL: "http://relay-router:8080"
    # URL workspace pods use to reach the relay-router for free-model
    # inference (Design Principle 6, Epic 42). Empty → the chart derives the
    # cross-namespace FQDN `http://relay-router.<release-ns>.svc.cluster.local:8080`
    # so it resolves from workspace pods in ANY namespace (the controller
    # watches cluster-wide by default). Set this only if you deploy the router
    # in a namespace other than the release namespace (the documented
    # out-of-band privileged-namespace case).
    workspaceRouterURL: ""

    # Relay-proxy binary distribution. The controller embeds these into each
    # relay VM's cloud-init so the VM can download + verify the binary. Without
    # this, a provisioned VM boots but crash-loops relay-proxy (file not found)
    # — the cloud-init has no download step.
    # See design/stories/epic-42.../README.md Layer 7 + Security §7.
    #
    # Build the binaries locally with `make relay-bin`, publish them to one or
    # more mirrors (GitHub Release asset is the default), then compute the
    # SHA-256 of each:
    #   sha256sum deploy/relay-proxy-arm64 deploy/relay-proxy-amd64
    artifact:
      # Base mirror URLs (cloud-init appends "/relay-proxy-<arch>" and tries
      # each in order). At least one is required; multiple give cross-cloud
      # resilience (e.g. GitHub + S3 + GCS).
      #
      # The default points at the explicit v0.1.0-relay tag rather than
      # /releases/latest/download because that release is currently flagged
      # `prerelease: true` on GitHub, so /latest/ would 404. When a non-prerelease
      # is published, this can be moved back to /releases/latest/download.
      # See worklog 0464 for the full rationale.
      urls:
        - "https://github.com/lenaxia/LLMSafeSpaces/releases/download/v0.1.0-relay"
      # Hex SHA-256 of the arm64 binary. REQUIRED when enabled. Verified by
      # cloud-init before exec (supply-chain integrity, Security §7).
      # The defaults below match the v0.1.0-relay GitHub release artifacts.
      sha256Arm64: "671c46c6c3c1b0afabe9fcdf4c815f4c0e08fe2c28d5d6eff988ba20900b2fc8"
      # Hex SHA-256 of the amd64 binary. REQUIRED when enabled.
      sha256Amd64: "ac12e27bf3a565781749b3bde5d0ff7062e362da259f9702e7852f351b731155"

    # Upstream the relay fleet proxies to. Defaults to opencode.ai/zen/v1 so a
    # default deploy produces working free-model inference via the anonymous
    # `public` key (which authorizes inference for any model Zen flags
    # `allowAnonymous` — verified 2026-06-20, worklog 0420 correction; the A23
    # claim that `public` is dead was disproven). The earlier default to
    # ai.thekao.cloud (PR #298) was based on that false premise; reverted.
    #
    # The OPTIONAL upstreamAuth.keySecret below configures router-side injection
    # of a real API key — leave it empty (the default) for a Zen free-model
    # fleet (the router forwards the client's `Authorization: Bearer public`
    # unchanged). Set it only when pointing the fleet at an upstream that
    # requires a real key (e.g. a paid gateway). When configured, the injected
    # key transits the router→relay HTTP path (per-VM token auth, worklog
    # 0442) and is never persisted on a relay VM disk. See worklog 0430/0435
    # supersession notes.
    upstreamURL: "https://opencode.ai/zen/v1"
    upstreamAuth:
      # K8s Secret (in the release namespace) holding the real upstream key.
      # The chart mounts keySecret.name[keySecret.key] as UPSTREAM_AUTH_KEY.
      # Create out-of-band, e.g.:
      #   kubectl -n <ns> create secret generic relay-upstream-key \
      #     --from-literal=key=sk-...
      keySecret:
        name: ""
        key: "key"
      # Header name to set; "" -> Authorization (sent as "Bearer <key>").
      # Set to e.g. "x-api-key" for Anthropic-native upstreams.
      header: ""

    # Relay-router Deployment + Service. The relay-router is a
    # lightweight Go proxy (cmd/relay-router/) that distributes
    # inference traffic across healthy relay VMs. It is deployed
    # in the release namespace and runs as a single replica.
    # The controller syncs the relay-router-peers ConfigMap which
    # the router mounts at /etc/relay-router/peers.json.
    router:
      image:
        repository: ghcr.io/lenaxia/llmsafespaces/relay-router
        tag: ""
        pullPolicy: IfNotPresent
      service:
        type: ClusterIP
        port: 8080
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
      nodeSelector: {}
      tolerations: []
      affinity: {}

  # 2026-06-23 cold-start optimization (item #1a): the controller
  # periodically fetches the opencode free-tier model catalog from
  # models.dev and publishes it as a ConfigMap. Workspace pods consume
  # the CM to pre-render their relay agent-config.json before opencode
  # boots, eliminating the in-pod opencode-restart cycle that the
  # legacy relay-injector goroutine imposed (~6-8s saved per cold
  # start AND every resume).
  #
  # When disabled, workspace pods fall back to the in-pod relay
  # injector goroutine (legacy behavior).
  #
  # The ConfigMap is created in the release namespace and named
  # `llmsafespaces-free-models`.
  freeModelsRefresher:
    enabled: true
    # How often to re-fetch from upstream. Catalog changes ~weekly so
    # 6h is generous; lower values increase load on models.dev.
    refreshInterval: 6h
    # Override URL for the free-models catalog. Empty defaults to
    # https://models.dev/api.json. Useful for air-gapped clusters that
    # mirror the catalog internally.
    apiURL: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 5

# ----------------------------------------------------------------------------
# Platform requirements (workspace pods)
# ----------------------------------------------------------------------------
# Worklog 371 H4: workspace pods read memory usage and pressure from cgroup v2
# (/sys/fs/cgroup/memory.current, /sys/fs/cgroup/memory.max). cgroup v2 is a
# HARD REQUIREMENT for:
#   - US-44.5 memory pressure warnings (>85% of limit)
#   - US-44.8 workspace_memory_bytes ops gauge
#   - US-44.4 OOM-limit detection / workspace_oom_kills_total attribution
#
# On cgroup v1 hosts these features silently produce nothing — agentd logs a
# single Warn per pod boot ("cgroup v2 memory.current unreadable") so the
# silent degradation is observable, but the features remain unavailable until
# the pod is scheduled on a cgroup v2 node. cgroup v2 is the default on all
# supported runtime images (Debian bookworm-slim) and all modern Kubernetes
# node OSes (Debian 11+, Ubuntu 22.04+, RHEL 9, Flatcar, Bottlerocket). The
# chart does NOT set a nodeSelector for cgroup v2 because scheduling-time
# detection is unreliable across distros; the runtime-time warning is the
# authoritative signal.
workspace:
  cgroupV2Required: true

  # defaultStorageClass: when non-empty, pins the
  # `workspace.defaultStorageClass` instance setting to this value at API
  # boot (SetHelmOverrides). The admin UX will show it disabled with a
  # "Managed by Helm" badge; PUT /admin/settings/workspace.defaultStorageClass
  # returns 409. When empty (default), the setting stays admin-mutable via
  # the settings UI/API — falling through to the DB-backed value (schema
  # default "" = use cluster-default StorageClass).
  #
  # Set this when the cluster provides a dedicated lower-durability
  # StorageClass for ephemeral workspaces (e.g. Longhorn 2-replica) that
  # you want every workspace to use without relying on admins to configure
  # it post-install.
  #
  # Example: defaultStorageClass: longhorn-2r
  defaultStorageClass: ""

# ----------------------------------------------------------------------------
# Terminal WebSocket proxy
#
# G35: the WebSocket terminal proxy (POST /workspaces/:id/terminal/ticket →
# GET /workspaces/:id/terminal) enforces an Origin policy on upgrade. Default
# is same-origin only: a browser request whose Origin does not match the
# API's own Host is rejected at upgrade. Non-browser clients (no Origin
# header) are accepted — they authenticate via the single-use ticket, not
# cookies, so CSRF does not apply.
#
# allowedOrigins: list of additional origins to accept cross-origin browser
# requests from. Use this when the frontend and API are served from
# different hostnames (e.g. https://app.example.com → https://api.example.com).
# A single entry of "*" disables Origin checking entirely (the historical
# behaviour) — use only if you understand the cross-site WebSocket
# hijacking risk.
#
# Example:
#   terminal:
#     allowedOrigins:
#       - https://app.example.com
terminal:
  allowedOrigins: []

# ----------------------------------------------------------------------------
# CRDs
# ----------------------------------------------------------------------------
# CRDs are installed from the chart's crds/ directory by default.
# Set install: false to manage CRDs out-of-band (recommended for production
# upgrade safety, since Helm 3 does not upgrade CRDs in crds/).
crds:
  install: true
  # If install is false, you MUST apply the CRDs from helm/crds/
  # before installing this chart.

# ----------------------------------------------------------------------------
# External dependencies
# ----------------------------------------------------------------------------
# Postgres and Redis must be provided externally. The chart does not bundle
# either dependency. See helm/README.md for examples of how
# to install them separately (CloudNativePG, Spotahome Redis Operator, raw
# manifests for kind, etc.).
#
# Connection details are passed via .api.config (host/port/db) and the
# externalSecret reference below for credentials.
externalSecret:
  # If create: true, the chart creates a Secret with the credentials below.
  # If false, the chart expects a Secret named .existingSecret to already
  # exist with keys: postgres-password, redis-password, jwt-secret.
  create: true
  existingSecret: ""

  # Used only when externalSecret.create is true.
  # SECURITY (G26): all three credentials are auto-generated as 32-char
  # alphanumeric strings on first install when left empty here. Pin a
  # specific value via --set or --values only when you need to match an
  # external Postgres/Redis instance whose password is already known.
  # Leaving them empty means "let the chart pick a strong default and
  # keep it stable across upgrades" — the Secret is annotated
  # `helm.sh/resource-policy: keep` so the random value is generated
  # once and persisted.
  #
  # ROTATION-OUT-OF-VULNERABLE-STATE: if a previous chart version left
  # postgres-password="changeme" or redis-password="" in the live Secret,
  # the next `helm upgrade` will re-randomise both values and the
  # operator MUST then run the ALTER USER procedure documented in
  # NOTES.txt to bring the running Postgres role in sync.
  postgresPassword: ""
  redisPassword: ""
  jwtSecret: ""
  # Root KEK for admin provider credentials (LLMSAFESPACES_MASTER_SECRET).
  # Auto-generated as a 64-char random on first install when left empty.
  # Rotating this value invalidates all admin-encrypted credentials.
  masterSecret: ""

# ----------------------------------------------------------------------------
# Master KEK delivery to the API pod (US-50.1)
# ----------------------------------------------------------------------------
# HOW the master KEK (the value stored at externalSecret.masterSecret above)
# reaches the API container. This is distinct from externalSecret.masterSecret,
# which is the *value* of the key.
#
# deliveryMethod:
#   file (default) — project the KEK as a read-only file at fileMountPath
#                    (mode 0440). The KEK never appears in /proc/<pid>/environ,
#                    eliminating env-var exposure. This is the production default.
#   env            — legacy opt-in: deliver the KEK as the LLMSAFESPACES_MASTER_SECRET
#                    env var. Retained for one release for non-Helm deployments
#                    (bare kubectl apply, docker-compose). The API logs a
#                    deprecation Warn when this path is used.
masterSecret:
  deliveryMethod: file
  # NOTE: must NOT be inside the api config volume mountPath (/etc/llmsafespaces).
  # Nested subPath secret-over-configmap mounts fail at runc with "not a directory"
  # on some kernel/runtime combinations. /var/run/secrets/<svc>/ is the FHS-correct
  # location for projected service secrets and avoids the collision.
  fileMountPath: /var/run/secrets/llmsafespaces/master-secret

# ----------------------------------------------------------------------------
# Cloud KMS Provider (Epic 57 US-57.1)
# ----------------------------------------------------------------------------
# When enabled, the master KEK is backed by cloud KMS instead of the local
# static/sealed file. The KEK never leaves the cloud service — an API-pod
# RCE can call Decrypt while running but cannot exfiltrate the key for
# offline use after eviction (exfiltration limitation + audit, not prevention).
#
# Three KMS keys are required (D4: per-purpose domain separation):
#   providerCredentials — admin/org LLM API keys
#   orgCredentials      — org-level credentials
#   masterKek           — API keys + org SSO client secrets (shared provider)
#
# The master-secret file mount is RETAINED under KMS — it protects the
# Redis DEK cache (volatile, regenerable). KMS protects only the durable
# KEK-protected Postgres tables.
#
# D9: Sustained KMS unavailability causes all KEK-dependent decrypts to
# fail simultaneously. Multi-region KMS keys recommended for HA.
kms:
  aws:
    enabled: false
    region: ""
    credentialsSecret: ""
    keyArns:
      providerCredentials: ""
      orgCredentials: ""
      masterKek: ""
  gcp:
    enabled: false
    credentialsSecret: ""
    keyNames:
      providerCredentials: ""
      orgCredentials: ""
      masterKek: ""

# ----------------------------------------------------------------------------
# Datastore NetworkPolicies (G26)
# ----------------------------------------------------------------------------
# The chart ships NetworkPolicy resources blocking ingress to postgres and
# valkey except from the API deployment and migration Job. Workspace pods
# (selectable by `component=workspace`) cannot reach the datastores.
#
# Enabled by default but gated by the master `networkPolicy.enabled` toggle
# AND `datastore.networkPolicy.enabled`. Disable per-class without
# disabling the workspace policies if needed.
datastore:
  networkPolicy:
    enabled: true
    # Pod label selectors for the postgres / valkey pods. The defaults
    # match local/postgres-redis.yaml and local/deps-{postgres,valkey}.yaml.
    # If you deploy postgres via Bitnami helm chart, override with
    # `{ app.kubernetes.io/name: postgresql }`.
    postgresPodSelectorLabels:
      app: postgres
    valkeyPodSelectorLabels:
      app: valkey

# Postgres connection (consumed by the API config).
postgresql:
  host: postgres
  port: 5432
  user: llmsafespaces
  database: llmsafespaces
  sslMode: disable
  maxOpenConns: 25
  maxIdleConns: 10
  connMaxLifetime: 5m

# Redis connection (consumed by the API config).
#
# H3 (worklog 371) PRODUCTION REQUIREMENT: the API caches per-workspace
# opencode passwords in Redis in PLAINTEXT (see wsstate.SetCachedPassword).
# This is necessary because the proxy needs the plaintext for Basic-Auth on
# every forwarded request — hashing would defeat the cache. Production Redis
# deployments MUST therefore provide:
#   - TLS in-transit (configure the API to use rediss://, or run a TLS sidecar)
#   - At-rest encryption (Redis 7 ACL + encryption, or PVC-level encryption)
#   - NetworkPolicy restricting Redis ingress to API pods only
# Without these, workspace passwords are exposed in Redis RDB/AOF dumps,
# memory, and backups. The passwords are per-workspace generated credentials
# (not user passwords), bounded by a 1h TTL, and the source of truth is the
# K8s Secret (encrypted at rest by the cluster).
redis:
  host: redis-master
  port: 6379
  db: 0
  poolSize: 20

# ----------------------------------------------------------------------------
# Database migrations
# ----------------------------------------------------------------------------
# Migrations are run as a Helm pre-install / pre-upgrade Job using the
# migrate/migrate image. The SQL files under helm/migrations/
# are bundled into a ConfigMap (migrations-configmap.yaml) mounted at
# /migrations; the Job points the migrate CLI at it via -path=/migrations.
migrations:
  enabled: true
  image:
    # Empty repository/tag falls back to migrate/migrate:v4.17.1 (set in
    # templates/migration-job.yaml). Override only if you need a different
    # migrate CLI image.
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

# ----------------------------------------------------------------------------
# Optional Postgres role + database bootstrap (issue #423)
# ----------------------------------------------------------------------------
# On a green-field install against a stock Postgres (Bitnami postgresql chart,
# raw postgres:16 Deployment, CloudNativePG Cluster bootstrapped with a
# superuser only), the pre-install migration Job fails because the
# llmsafespaces role and database do not exist yet:
#
#   FATAL: database "llmsafespaces" does not exist
#   FATAL: role "llmsafespaces" does not exist
#
# Disabled by default so operators with externally-managed Postgres (where a
# DBA already created the role+DB) are unaffected. When enabled, the chart
# renders a pre-install/pre-upgrade Helm-hook Job that connects to Postgres
# as a superuser and runs idempotent CREATE ROLE / CREATE DATABASE
# statements. The Job runs at hook-weight -10, before the migration Job
# (weight -5) but after the credentials Secret (weight -15), so the app
# password it sets is already materialized.
#
# Requires a Secret (created out-of-band) containing the Postgres superuser
# credentials. For CloudNativePG this is typically the cluster's
# <name>-superuser Secret; for Bitnami postgresql it is the release's
# <release>-secret under keys username/password by default.
dbInit:
  enabled: false
  # Image used for the bootstrap Job. Defaults to postgres:16-alpine, which
  # ships the psql client. Override if your environment mirrors images to a
  # private registry.
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # Secret in the release namespace holding the Postgres superuser
  # credentials. Required when dbInit.enabled=true; the chart fails the
  # render if it is empty (pointing the Job at an unnamed Secret would just
  # move the failure one step later).
  superuserSecret:
    name: ""
    # Keys inside that Secret. Defaults match the CloudNativePG / Bitnami
    # convention.
    userKey: username
    passwordKey: password
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

# ----------------------------------------------------------------------------
# Network policies (Epic 17 G16 remediation; EVOLUTION-V2 §9.7)
# ----------------------------------------------------------------------------
# When enabled (default), the chart ships:
#
#   1. workspace-default-deny-ingress
#      Default-deny ingress for sandbox pods. Without this, any pod in the
#      cluster (including other tenants' workspaces) can reach a sandbox.
#      The API proxy explicitly allows itself via API-server pod selector.
#
#   2. workspace-egress
#      Default-deny egress with explicit allowances for:
#        - DNS (UDP/TCP 53 to kube-system kube-dns)
#        - LLM provider domains via FQDN policy if your CNI supports it,
#          otherwise CIDRs from .networkPolicy.allowedEgressCIDRs.
#      Without DNS, sandbox pods can't resolve any external host on boot.
#
# Operators with their own network policy controller (Cilium CRDs, etc.)
# can opt out by setting enabled: false. The threat model assumption A2
# requires SOME default-deny is in place; operators turning this off MUST
# document the equivalent control.
networkPolicy:
  enabled: true

  # Workspace egress NetworkPolicy toggle.
  #
  # When enabled (default): the chart creates a K8s NetworkPolicy that
  # allows workspace pod egress to DNS + operator-specified CIDRs (see
  # allowedEgressCIDRs below). This is the baseline threat-model A2
  # control on Free-tier-CNI clusters.
  #
  # When disabled: the chart skips the egress NP entirely. Use ONLY
  # when a CNI-native policy (Cilium CiliumNetworkPolicy, Calico
  # GlobalNetworkPolicy, etc.) is enforcing a strict FQDN allowlist —
  # otherwise workspace pods have no egress restriction at all.
  #
  # WHY THE TOGGLE EXISTS: Kubernetes NetworkPolicy unions allow rules
  # across ALL policies attached to a pod. If both this chart's NP AND
  # a Cilium CNP are in play, effective egress = union = whichever is
  # more permissive. Since this NP allows 0.0.0.0/0 by default, it
  # defeats FQDN-based allowlists in the CNP. Discovered during
  # 2026-07-02 Cilium migration; documented in
  # ops-prod/docs/runbooks/cilium-migration.md gotcha #10.
  workspaceEgress:
    enabled: true

  # API server pod selector — used by workspace ingress allow rule so the
  # API proxy can reach sandbox pods on agentd port 4097.
  apiPodLabelSelector:
    app.kubernetes.io/name: llmsafespaces
    app.kubernetes.io/component: api

  # Controller pod selector — used by workspace ingress allow rule so
  # the controller's /v1/healthz + /v1/statusz polls (Epic 22 health-
  # endpoint redesign) can reach sandbox pods on the agentd admin port
  # 4098. Without this rule the controller's probes time out, the
  # 3-strike threshold trips, the controller kills the pod, recreates
  # it, and the cycle repeats indefinitely (worklog: live-fix after
  # G16 enablement broke Epic 22's health polling).
  controllerPodLabelSelector:
    app.kubernetes.io/name: llmsafespaces
    app.kubernetes.io/component: controller

  # Prometheus pod selector — used by workspace ingress allow rule so the
  # Prometheus scraper can reach workspace pods on the agentd admin port
  # 4098 (/metrics). Only takes effect when monitoring.serviceMonitors.agentdPodMonitor.enabled
  # is true. The default matches the kube-prometheus-stack chart's Prometheus
  # pod labels; override to match a custom Prometheus deployment. The
  # prometheusNamespace defaults to the release namespace but is typically
  # overridden to the namespace where Prometheus runs (e.g. "monitoring").
  prometheusPodLabelSelector:
    app.kubernetes.io/name: prometheus
  prometheusNamespace: ""

  # F5 (worklog 0372): opt-in default-deny ingress for the API pod itself.
  # When true, the chart renders an API NetworkPolicy that admits only the
  # controller (internal org-status polls), kube-system (kubelet probes), and
  # the pod selector below (typically your ingress controller / frontend).
  # DEFAULT IS FALSE because the user-traffic source is deployment-specific
  # (ingress controller labels vary) and a wrong allowlist would lock users
  # out. The internal org-status endpoint is already authenticated by the
  # mandatory LLMSAFESPACES_INTERNAL_TOKEN (fail-closed), so this policy is
  # defense-in-depth, not the primary control. Enable after confirming the
  # ingress source selector matches your environment.
  apiIngressRestricted: false
  # Pod selector (in the release namespace) allowed to send user traffic to
  # the API when apiIngressRestricted=true. Defaults to the frontend pods;
  # override to your ingress controller (e.g. {ingress-nginx: controller}).
  apiIngressSourcePodSelector:
    app.kubernetes.io/name: llmsafespaces
    app.kubernetes.io/component: frontend

  # DNS policy: where to send port-53 traffic. Default targets the
  # kube-system/kube-dns service which works on most clusters
  # (kube-dns, CoreDNS). Override on clusters with non-standard DNS.
  dnsNamespace: kube-system
  dnsPodLabelSelector:
    k8s-app: kube-dns

  # CIDR allowlist for sandbox egress. Defaults to RFC1918 (private)
  # negation so all public internet traffic is allowed and only internal
  # cluster traffic is blocked. This is the documented Epic 17 baseline;
  # tighter operators can replace with a strict allowlist.
  allowedEgressCIDRs:
    - 0.0.0.0/0
  # Block egress to RFC1918 + cloud metadata; sandbox pods should never
  # reach in-cluster services or the cloud metadata endpoint.
  blockedEgressCIDRs:
    # This list mirrors `privateOrInternalCIDRs` in
    # controller/internal/workspace/network_policy.go. Keep both in sync;
    # the chart-test TestG16_DefaultRender_BlockedEgressIncludesAllControllerSideCIDRs
    # pins parity for the security-relevant subset.
    - 10.0.0.0/8        # RFC1918 — in-cluster service ranges, internal admin endpoints
    - 172.16.0.0/12     # RFC1918
    - 192.168.0.0/16    # RFC1918
    - 169.254.0.0/16    # link-local + cloud metadata (169.254.169.254)
    - 100.64.0.0/10     # CGNAT — used by managed Kubernetes pod CIDRs (AKS, some EKS, k3s default)
    - 127.0.0.0/8       # loopback
    - 224.0.0.0/4       # multicast

# ----------------------------------------------------------------------------
# Kyverno admission policies (Section 9.6 of EVOLUTION-V2.md)
# ----------------------------------------------------------------------------
# DEFERRED to V2.1 in EVOLUTION-V2.md, but US-5.4 acceptance criteria require
# the chart to support them. Disabled by default; opt in by setting
# enabled: true. Requires Kyverno to be installed in the cluster.
kyverno:
  enabled: false
  # If enabled is false, the chart prints a warning in NOTES.txt that
  # Kyverno-enforced workspace pod security is not active.

# ----------------------------------------------------------------------------
# Service accounts
# ----------------------------------------------------------------------------
serviceAccount:
  api:
    create: true
    annotations: {}
    name: ""
  controller:
    create: true
    annotations: {}
    name: ""

# ----------------------------------------------------------------------------
# RBAC
# ----------------------------------------------------------------------------
rbac:
  create: true
  # scope controls how the controller's RBAC is granted:
  #   "namespace" (default, G5)  Role + RoleBinding scoped to .Release.Namespace
  #                              and the workspace namespace only. The
  #                              controller can manage workspaces ONLY in the
  #                              configured namespace(s). Use this with
  #                              controller.watchNamespaces unset (or set to
  #                              the workspace namespace) for tightest
  #                              least-privilege.
  #   "cluster"                  Adds a ClusterRole + ClusterRoleBinding for
  #                              llmsafespaces.dev/* + storageclasses, letting
  #                              the controller watch workspaces across all
  #                              namespaces. Pods, secrets, PVCs, and
  #                              NetworkPolicies remain namespace-scoped
  #                              regardless — operators running multi-
  #                              namespace deployments must per-namespace-bind
  #                              the workspace Role themselves.
  #
  # SECURITY (G5, Epic 17): the default flipped from "cluster" to
  # "namespace" in worklog 0107. Pre-flip the chart-default install
  # gave the controller cluster-wide secrets+pods access; that was a
  # blast-radius hazard for a single-namespace deployment. Operators
  # who genuinely need cluster-wide CRD watch must explicitly opt in.
  scope: "namespace"
  # If false, you must create the (Cluster)Role + (Cluster)RoleBinding
  # out-of-band.

# ----------------------------------------------------------------------------
# Admission webhooks
# ----------------------------------------------------------------------------
# The controller registers ValidatingAdmissionWebhooks for Workspace,
# and RuntimeEnvironment resources. These provide
# defense-in-depth: even if a user has direct kubectl access to create CRDs,
# the webhook validates the object before persistence.
#
# REQUIREMENT: cert-manager must be installed in the cluster (the chart uses
# cert-manager.io/v1 Certificate + Issuer to provision the webhook server's
# TLS cert and inject the CA bundle into the ValidatingWebhookConfiguration).
#
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.0/cert-manager.yaml
#
# If you do not have cert-manager and cannot install it, set webhooks.enabled
# to false. The chart will not deploy the webhook configuration. Validation
# still happens server-side in the API service (where users normally hit it),
# but operators using kubectl directly will bypass validation.
webhooks:
  enabled: true
  # cert-manager Issuer kind. "Issuer" is namespace-scoped (recommended);
  # "ClusterIssuer" is cluster-scoped.
  issuerKind: "Issuer"
  # If empty, the chart creates a self-signed Issuer. If set, the chart uses
  # an existing Issuer/ClusterIssuer and skips creating one.
  existingIssuer: ""
  # failurePolicy: "Fail" rejects requests if the webhook is unavailable
  # (recommended for security); "Ignore" allows requests through.
  failurePolicy: "Fail"
  # timeoutSeconds for webhook calls. Max 30s.
  timeoutSeconds: 10
  #
  # G2 (Epic 17) — Workspace admission allow-lists. The Workspace
  # validating webhook gates Spec.Runtime image references and
  # Spec.Storage parameters using these lists.
  #
  # allowedImageRegistries: list of registry-prefix strings. Any
  # Workspace whose runtime contains '/' (i.e. is shaped like an
  # explicit container image reference) must match at least one
  # prefix here. Empty list means ONLY RuntimeEnvironment-name
  # references are allowed (e.g. `runtime: python-3.11`).
  allowedImageRegistries:
    - "ghcr.io/lenaxia/"
  #
  # allowedStorageClassNames: optional. If non-empty, the
  # Spec.Storage.StorageClassName must be one of these. Empty means
  # any StorageClassName is allowed (operator-defined cluster default
  # always passes; this list constrains user-supplied values).
  allowedStorageClassNames: []
  #
  # maxWorkspaceStorageGi: maximum requested workspace storage in GiB.
  # Storage requests above this are rejected at admission. 0 disables
  # the upper bound. The CRD pattern `^[0-9]+(Gi|Mi)$` already
  # enforces shape; this enforces magnitude.
  maxWorkspaceStorageGi: 1024
  #
  # G4 (F1.2.3) — Spec.Resources caps. The CRD pattern lets through
  # values like "999999999m" CPU; without these caps the workspace pod
  # is admitted but stays Pending forever, wasting tenant quota and
  # confusing operators. Defaults: 16 cores, 64 GiB memory.
  # Set 0 to disable each cap individually.
  maxWorkspaceCPUMillicores: 16000
  maxWorkspaceMemoryMi: 65536

  # Epic 51 S51.2 — per-tenant resource quotas. Enforced by a validating
  # webhook on Pod create that counts existing workspace pods per tenant
  # (identified by the llmsafespaces.dev/tenant label) and rejects creation
  # when the aggregate would exceed these limits. Prevents noisy-neighbor
  # resource exhaustion in multi-tenant deployments.
  #
  # All values default to 0 (disabled). Enable for multi-tenant deployments.
  # Org-specific overrides (from org_policies) are a follow-up; billing tier
  # → quota mapping is tracked under Epic 43.
  tenantQuota:
    # Maximum concurrent workspace pods per tenant. Recommended: 10-20.
    maxWorkspacesPerTenant: 0
    # Maximum aggregate CPU requests per tenant (millicores). Recommended: 8000 (8 cores).
    maxCPUMillisPerTenant: 0
    # Maximum aggregate memory requests per tenant (MiB). Recommended: 16384 (16GiB).
    maxMemoryMiPerTenant: 0


# ----------------------------------------------------------------------------
# gVisor — Container runtime isolation (Epic 51)
# ----------------------------------------------------------------------------
# gVisor (runsc) provides kernel-level isolation for workspace pods by
# intercepting syscalls in userspace. This is the primary control against
# container escape for multi-tenant deployments where tenants run arbitrary
# code. Without gVisor, a kernel exploit in a tenant pod can reach the host
# node and access other tenants' data.
#
# PREREQUISITES (operator must provision):
#   - gVisor (runsc) installed on all workspace nodes
#   - Container runtime configured with runsc handler
#   For EKS + Karpenter: install runsc via EC2NodeClass userData.
#   For manual clusters: https://gvisor.dev/docs/user_guide/install/
#
# When enabled, the chart:
#   1. Creates a RuntimeClass named "gvisor" (handler: runsc)
#   2. Sets --default-runtime-class=gvisor on the controller
# Workspace pods will then run under gVisor by default. Individual workspaces
# can opt out via spec.runtimeClass: "runc" (admin-gated, for gVisor-
# incompatible workloads like ptrace debuggers). Admin-gating is enforced by
# the workspace validating webhook: spec.runtimeClass is rejected (to ANY
# value, including the empty-string "" opt-out) unless the workspace object
# carries the annotation
#   llmsafespaces.dev/allow-runtime-class-override: "true"
# Operators apply that annotation via direct kubectl/cluster-admin RBAC;
# tenant API users (without cluster RBAC) cannot.
gvisor:
  enabled: false
  # RuntimeClass name. Change if you have a custom gVisor RuntimeClass.
  defaultRuntimeClass: "gvisor"


# --- Runtime Environments (seeded CRDs) ---
runtimeEnvironments:
  base:
    image:
      repository: ghcr.io/lenaxia/llmsafespaces/base
      tag: ""

# --- Frontend (optional web UI) ---
frontend:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/lenaxia/llmsafespaces/frontend
    tag: ""
    pullPolicy: IfNotPresent
  # API base URL injected at container start via docker-entrypoint.sh
  apiBaseUrl: "/api/v1"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: "safespace.example.com"
    # RT-6.14 (Epic 17): TLS default flipped from `false` → `true`.
    # Operators must explicitly set `tls: false` to disable HTTPS for
    # the frontend ingress. Pre-fix the chart-default install
    # exposed the frontend over plain HTTP, leaking JWT cookies on
    # every request. Combined with the HSTS header in `annotations`
    # below, this prevents downgrade attacks from session takeover.
    tls: true
    tlsSecret: ""
    # G31 (Epic 17 worklog 0092 RT-7.13): pre-fix the frontend
    # ingress carried no security headers. Default annotations
    # below set CSP, X-Frame-Options, and HSTS for ingress-nginx.
    # Operators using a different ingress (Traefik, HAProxy)
    # should override `annotations` to use their controller's
    # equivalent header-injection annotations. Override with:
    #
    #   --set 'frontend.ingress.annotations.<key>=<val>'
    #
    # CSP frame-ancestors 'none' + X-Frame-Options DENY together
    # block clickjacking. CSP default-src 'self' constrains XSS
    # blast radius if rehype-sanitize is bypassed (RT-7.9).
    annotations:
      nginx.ingress.kubernetes.io/configuration-snippet: |
        more_set_headers "Content-Security-Policy: default-src 'self'; connect-src 'self' wss:; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
        more_set_headers "X-Frame-Options: DENY";
        more_set_headers "X-Content-Type-Options: nosniff";
        more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
        more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    # additionalHosts: additional hostnames for the frontend. Each entry
    # produces a separate Ingress rule with both /api → API service and
    # / → frontend paths, identical in structure to the primary host rule.
    # Use for serving the frontend on multiple domains (e.g. chat.safespaces.dev).
    # Each entry: { host: "chat.example.com" [, tlsSecret: "override-secret"] }
    additionalHosts: []

mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: llmsafespaces/mcp
    tag: ""
    pullPolicy: IfNotPresent
  # Transport mode: "sse" for HTTP SSE server, "stdio" for sidecar/subprocess use
  transport: "sse"
  service:
    type: ClusterIP
    port: 3001
  # API base URL the MCP server calls (typically the in-cluster API service)
  apiBaseUrl: "http://{{ .Release.Name }}-api:8080"
  # Timeout for session_message (waiting for agent response)
  timeout: "300s"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL

# US-43.19 / D20: shared secret authenticating the controller→API internal
# org-status calls (the endpoint the workspace reconciler polls to drive
# org-level suspension). Leave empty ("") to have the chart auto-generate a
# random secret on first install and preserve it across upgrades (same model
# as jwtSecret). The value is stored as the `internal-token` key in the
# llmsafespaces-credentials Secret and mounted as LLMSAFESPACES_INTERNAL_TOKEN on
# BOTH the API and the controller. The internal org-status endpoint FAILS
# CLOSED (403) when this is unset, so it MUST be set for org-suspension to work.
internalToken: ""

# ----------------------------------------------------------------------------
# Outbound email (Epic 49)
# ----------------------------------------------------------------------------
# Transactional email is used for org invitations, password reset, and email
# verification. When disabled (the default), the API uses a NoopProvider
# that logs emails to stderr — no email is actually sent.
#
# To enable SES:
#   1. Set enabled: true, provider: ses, sesRegion, fromAddress, baseUrl.
#   2. Configure IRSA: set serviceAccount.api.annotations to add the
#      EKS role ARN, e.g.:
#        serviceAccount:
#          api:
#            annotations:
#              eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/llmsafespaces-ses
#      The IAM role must have ses:SendEmail permission and be trusted by the
#      cluster's OIDC provider. No static AWS credentials are stored by the
#      platform — IRSA is the credential path.
#   3. Verify the fromAddress (or its domain) in AWS SES. In sandbox mode,
#      recipient addresses must also be verified.
#   4. Publish DKIM/SPF/DMARC records for the sending domain so mail does
#      not land in spam (spam filtering worsens scanner-consumption of
#      single-use verification/reset links).
#
# fromAddress: verified SES sender (e.g. noreply@example.com).
# baseUrl: public origin used to build links in email bodies
#          (e.g. https://app.example.com). Must match the frontend ingress host.
#
# Env vars LLMSAFESPACES_EMAIL_* remain as higher-precedence overrides
# (Viper applies AutomaticEnv after reading config.yaml), but the
# helm-rendered config.yaml is now the default configuration path.
email:
  enabled: false
  # Provider: "" (noop) or "ses". "smtp" is a future provider.
  provider: ""
  # SES-only fields.
  sesRegion: ""
  fromAddress: ""
  baseUrl: ""

# ----------------------------------------------------------------------------
# Per-org OIDC SSO plumbing (Epic 43 / US-43.10 / D17)
# ----------------------------------------------------------------------------
# INSTANCE-LEVEL wiring for the already-shipped per-org OIDC login flow.
# This does NOT configure an identity provider — each org configures its own
# IdP via the /api/v1/orgs/:id/sso API (see OrgSSOTab in the frontend, and
# README-LLM.md §14). These three values control where the IdP redirects
# back to and where the browser lands after SSO completes.
#
# redirectBaseUrl:
#   Absolute origin the IdP redirects back to. The full callback URL is
#   {redirectBaseUrl}/api/v1/auth/sso/:orgSlug/callback.
#   SET THIS IN PRODUCTION. When empty, the start endpoint derives the
#   callback URL from X-Forwarded-Proto + Host headers (F11 header-trust
#   gap documented at api/internal/handlers/org_sso.go:245 — the IdP's
#   registered-redirect-URI check is the only mitigation).
#
# frontendRedirectUrl:
#   Where the browser lands after a successful or failed SSO callback
#   (e.g. https://app.example.com). When empty, defaults to "/".
#
# stateCookieName:
#   Signed PKCE/state cookie name. When empty, defaults to "lsp_sso_state"
#   in the Go code (api/internal/services/sso/sso.go:132). Override only
#   if a collision with another cookie exists.
#
# Env vars LLMSAFESPACES_OIDC_* remain as higher-precedence overrides
# (Viper applies AutomaticEnv after reading config.yaml), but the
# helm-rendered config.yaml is now the default configuration path.
oidc:
  redirectBaseUrl: ""
  frontendRedirectUrl: ""
  stateCookieName: ""

# Epic 54, US-54.3: Org-scoped login via wildcard subdomain routing.
# When enabled, POST /auth/lookup (US-54.1) redirects found users to
# https://<orgSlug>.<baseDomain>, where this chart's wildcard Ingress
# routes them to the frontend. The session cookie carries Domain=<cookieDomain>
# so it survives the root→subdomain redirect.
#
# PREREQUISITES (operator tasks — see S54-0 spike in the epic README):
#   1. Wildcard DNS:  *.app.example.com  →  ingress controller LB IP.
#   2. cert-manager installed (the chart already depends on it for webhooks;
#      see templates/webhook-cert.yaml). Provide an Issuer/ClusterIssuer that
#      can issue for the wildcard — Let's Encrypt works.
#   3. Ingress controller that supports wildcard host rules (ingress-nginx,
#      Traefik, HAProxy all do).
#
# Default: disabled. Single-host deploys are unaffected.
orgSubdomainRouting:
  enabled: false
  # baseDomain: the parent domain that org slugs prepend.
  #   Example: "app.example.com" → org "acme" → "acme.app.example.com".
  #   Must be set when enabled=true.
  baseDomain: ""
  # cookieDomain: the value set on the lsp_session cookie's Domain attribute.
  #   Must start with a leading dot so the cookie is visible to all subdomains.
  #   Example: ".app.example.com" → cookie sent to app.example.com + *.app.example.com.
  #   When empty (default), the cookie is host-only (current behavior).
  #   Must be set when enabled=true.
  cookieDomain: ""
  # wildcardCert: cert-manager Certificate configuration for *.<baseDomain>.
  # Only rendered when enabled=true AND frontend.ingress.tls=true.
  # If you already have a wildcard TLS Secret (e.g. from an external issuer),
  # set tlsSecret to its name and leave issuerRef empty.
  wildcardCert:
    # tlsSecret: name of an existing TLS Secret to use instead of issuing one.
    # When set, no Certificate resource is rendered. The wildcard Ingress
    # references this Secret in its tls[] block.
    tlsSecret: ""
    # issuerRef: the cert-manager Issuer/ClusterIssuer that will issue the
    # wildcard certificate. Required when tlsSecret is empty.
    #   Example: { name: "letsencrypt-prod", kind: "ClusterIssuer" }
    issuerRef:
      name: ""
      kind: "ClusterIssuer"   # "ClusterIssuer" or "Issuer"

# ----------------------------------------------------------------------------
# Monitoring (Grafana dashboards, Prometheus alerts, ServiceMonitors)
# ----------------------------------------------------------------------------
# When enabled, the chart deploys Grafana dashboard ConfigMaps (picked up by
# the Grafana sidecar via the grafana_dashboard label), PrometheusRule
# resources (alerting rules for Alertmanager), and ServiceMonitor resources
# for Prometheus scraping.
#
# Requires:
#   - Grafana with the sidecar dashboard importer (grafana_dashboard: "1" label)
#   - Prometheus Operator (for PrometheusRule and ServiceMonitor CRDs)
#
# All sub-sections can be enabled/disabled independently.
monitoring:
  enabled: false

  # Grafana dashboard ConfigMaps.
  dashboards:
    enabled: true
    # Namespace to deploy dashboard ConfigMaps into. Defaults to the release
    # namespace. Override to deploy into Grafana's watching namespace.
    namespace: ""
    # Labels applied to the dashboard ConfigMap. The grafana_dashboard label
    # is required for the Grafana sidecar to import the dashboard.
    labels:
      grafana_dashboard: "1"
    annotations: {}

  # Grafana datasource ConfigMaps. Deploys a Postgres datasource that
  # the billing dashboard uses for per-user/per-workspace attribution
  # queries against the usage_events table.
  #
  # Requires:
  #   - Grafana with the sidecar datasource importer (grafana_datasource: "1" label)
  #   - A Kubernetes Secret containing the Postgres password under the
  #     key "PG_PASSWORD". By default this is the same Secret used by
  #     the API service (see existingSecret / postgresPassword above).
  #     The sidecar resolves ${PG_PASSWORD} from env vars injected into
  #     the Grafana pod; configure the Grafana chart to set this env var
  #     from the Secret.
  datasources:
    enabled: true
    # Namespace to deploy datasource ConfigMaps into. Defaults to the
    # release namespace. Override to deploy into Grafana's watching namespace.
    namespace: ""
    # Labels applied to the datasource ConfigMap. The grafana_datasource
    # label is required for the Grafana sidecar to import the datasource.
    labels:
      grafana_datasource: "1"
    annotations: {}
    postgres:
      # UID used by dashboard panels to reference this datasource.
      # Must match the pg_datasource variable default in billing.json.
      uid: "llmsafespaces-postgres"

  # PrometheusRule resources (alerting rules).
  prometheusRules:
    enabled: true
    # Namespace for PrometheusRule resources. Defaults to the release namespace.
    # Override to match where the Prometheus Operator is watching.
    namespace: ""
    # Additional labels for PrometheusRule resources (e.g. to match a
    # Prometheus Operator selector like `role: alert-rules`).
    labels: {}
    annotations: {}

  # ServiceMonitor resources for Prometheus scraping of API and controller.
  serviceMonitors:
    enabled: true
    # Namespace for ServiceMonitor resources. Defaults to the release namespace.
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    # Additional labels for ServiceMonitor resources (e.g. to match a
    # Prometheus Operator serviceMonitorSelector).
    labels: {}
    annotations: {}
    api:
      # Optional bearerTokenSecret for the API /metrics endpoint.
      # The API requires `Authorization: Bearer <token>` when the env var
      # LLMSAFESPACES_METRICS_TOKEN is set. If you use that env var, set
      # this to a Secret reference containing the same token under the
      # "token" key. If LLMSAFESPACES_METRICS_TOKEN is not set, leave this
      # empty (scrapes are unauthenticated).
      bearerTokenSecret: {}
      # Example:
      #   name: llmsafespaces-metrics-token
      #   key: token
    # PodMonitor for workspace pods' agentd admin port (:4098/metrics).
    # Workspace pods are dynamic (one per Workspace CRD) and addressed by
    # PodIP, so a PodMonitor (not ServiceMonitor) is the correct resource.
    # When enabled, the chart also extends the workspace NetworkPolicy to
    # permit Prometheus ingress on port 4098 — see networkPolicy.prometheusPodLabelSelector.
    # Without this, US-44.8 metrics (workspace_restarts_total, workspace_memory_bytes,
    # workspace_active_sessions, workspace_context_tokens, workspace_oom_kills_total)
    # are never scraped and do not appear in production dashboards.
    agentdPodMonitor:
      enabled: true

# ============================================================================
# Turnstile — Cloudflare CAPTCHA for /register (US-63.x).
# ============================================================================
# When enabled, the frontend renders a Turnstile widget on the register page
# and the API middleware verifies the client-supplied token before invoking
# the auth.Register handler. Blocks automated account creation without
# imposing friction on legitimate users (Cloudflare's "managed" mode is
# invisible for well-behaved browsers).
#
# Provisioning (once, out-of-band):
#   1. Cloudflare dashboard → Turnstile → Add site (mode=managed).
#   2. Copy the site key + secret key.
#   3. Store the SECRET in AWS Secrets Manager as
#      llmsafespaces/turnstile-secret (see llmsafespaces-cdk config).
#   4. Set enabled=true + siteKey below (or via CDK context, which emits
#      TURNSTILE_SITE_KEY in cluster-config → substituted by ops-prod).
#   5. Set secretKey.existingSecret to the K8s Secret name that holds the
#      Turnstile secret key (populated by ExternalSecret from step 3).
turnstile:
  enabled: false

  # Cloudflare site key (public). Baked into the frontend HTML at build time
  # so the user's browser can render the widget.
  siteKey: ""

  # Reference to the K8s Secret holding the SECRET key. The API service reads
  # this at runtime for verifying user-supplied tokens.
  secretKey:
    # Name of the Secret. ExternalSecret in ops-prod names this by convention.
    existingSecret: "llmsafespaces-credentials"
    # Key within the Secret whose value is the Turnstile secret.
    key: "turnstile-secret"

  # Cloudflare verification endpoint. Documented as stable at
  # https://developers.cloudflare.com/turnstile/get-started/server-side-validation/
  # Override only if using a self-hosted / regional Cloudflare offering.
  verifyURL: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
