name: Envtest (CRD defaults + webhook integration)

# M5-a: dedicated envtest workflow that verifies CRD kubebuilder defaults
# are applied by the real Kubernetes API server's admission webhook. This
# catches the class of bug from PR #231 that fake-client-based tests miss.
#
# Epic 51 S51.2: also runs webhook integration tests that verify the
# PodTenantQuotaValidator actually intercepts pod creates via the real
# API server, not just in-process Handle() calls. This catches webhook
# routing/path/selector bugs (e.g., the objectSelector matchLabels bug
# from PR #317 review).
#
# NOT required for merge — runs alongside the main CI pipeline like
# e2e-pr.yml.
#
# Downloads kube-apiserver + etcd binaries via setup-envtest (cached).

on:
  pull_request:
    branches: [main]
    paths:
      - 'pkg/apis/**'
      - 'helm/crds/**'
      - 'controller/internal/webhooks/**'
      - '.github/workflows/envtest.yml'
  schedule:
    # Nightly at 04:00 UTC — catches upstream envtest binary regressions.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  envtest:
    name: CRD defaults + webhook integration (envtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.20

      - name: Download envtest binaries (cached)
        uses: actions/cache@v4
        with:
          path: |
            ~/envtest-binaries
          key: envtest-${{ runner.os }}-${{ hashFiles('go.mod') }}
        id: cache-envtest

      - name: Setup envtest binaries
        run: |
          ASSETS_PATH="$(setup-envtest use 1.31.x -p path)"
          echo "KUBEBUILDER_ASSETS=$ASSETS_PATH" >> $GITHUB_ENV
          echo "Using envtest assets at: $ASSETS_PATH"

      - name: Run envtest CRD defaults tests
        run: go test -timeout 120s -race -tags envtest ./pkg/apis/llmsafespaces/v1/ -run TestEnvtest -v

      - name: Run envtest webhook integration tests
        run: go test -timeout 120s -race -tags envtest ./controller/internal/webhooks/ -run TestEnvtest -v
