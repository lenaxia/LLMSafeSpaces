name: E2E (PR)

on:
  pull_request:
    branches: [main]

jobs:
  e2e-frontend:
    name: Frontend E2E (Playwright, mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run unit + component tests
        working-directory: frontend
        run: npx vitest run

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run Playwright e2e (mocked backend)
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  e2e-fullstack:
    # DISABLED: The API requires a Kubernetes client at startup
    # (pkg/kubernetes/client.go) and there is no no-k8s / stub mode.
    # ci-compose.yaml provides Postgres + Valkey but no kubeconfig,
    # so the API container crashes immediately with:
    #   "failed to create in-cluster config: unable to load in-cluster
    #    configuration, KUBERNETES_SERVICE_HOST and KUBERNETES_SERVICE_PORT
    #    must be defined"
    #
    # Fix options (tracked in issue #24):
    #   A) Add LLMSAFESPACES_KUBERNETES_INCLUSTER=false + a minimal
    #      kubeconfig (pointing at a kind/k3s cluster or a fake API
    #      server) to ci-compose.yaml so the client can initialise.
    #   B) Add a LLMSAFESPACES_KUBERNETES_DISABLED env var that makes
    #      app.New() skip k8s client creation entirely and return stub
    #      implementations — safe for auth/session/credential flows
    #      that don't touch workspaces.
    # Option B is cleaner for CI but requires touching app.go and all
    # handlers that accept a KubernetesClient. Tracked as future work.
    name: Full-stack E2E (docker-compose)
    runs-on: ubuntu-latest
    if: false   # disabled — see comment above
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Start services (Postgres + Redis + API)
        working-directory: local
        run: |
          docker compose -f ci-compose.yaml up -d --build --wait
          # Wait for API to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/livez >/dev/null 2>&1; then
              echo "API is healthy"
              break
            fi
            sleep 2
          done

      - name: Seed test user
        run: |
          # Register a test user via the API
          curl -sf -X POST http://localhost:8080/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"e2e","email":"e2e@test.local","password":"e2e-password-123"}' || true

      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e (real API)
        working-directory: frontend
        env:
          E2E_USERNAME: e2e
          E2E_PASSWORD: e2e-password-123
          VITE_API_BASE_URL: http://localhost:8080/api/v1
        run: npx playwright test tests/e2e/auth.spec.ts tests/e2e/chat.spec.ts

      - name: Dump API logs on failure
        if: failure()
        working-directory: local
        run: docker compose -f ci-compose.yaml logs api --tail=100

      - name: Teardown
        if: always()
        working-directory: local
        run: docker compose -f ci-compose.yaml down -v
