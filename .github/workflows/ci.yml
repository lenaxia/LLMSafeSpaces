name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  # Manual trigger so a branch can produce a registry-pushed image set
  # (sha-<short>, ts-<timestamp>) for live cluster verification before
  # merge. The build steps gate on `event_name != 'pull_request'`, so
  # workflow_dispatch invocations do push images. Without this, a PR
  # branch only produces dockerbuild artifacts (not registry images),
  # which means an out-of-cluster operator cannot pull the PR's image
  # for a helm-upgrade dry run.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: lenaxia/llmsafespaces/api
  CONTROLLER_IMAGE: lenaxia/llmsafespaces/controller
  RUNTIME_IMAGE: lenaxia/llmsafespaces/base
  FRONTEND_IMAGE: lenaxia/llmsafespaces/frontend
  RELAY_ROUTER_IMAGE: lenaxia/llmsafespaces/relay-router
  RELAY_PROXY_IMAGE: lenaxia/llmsafespaces/relay-proxy

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      # repolint catches the failure modes that have caused production
      # incidents: duplicate migration version numbers, drift between
      # api/migrations/ and charts/llmsafespaces/migrations/, and
      # duplicate worklog numbers. See worklog 0098.
      - name: Repository layout lint
        run: make repolint

      # gofmt: blocks PRs containing un-formatted Go. The Makefile target
      # writes the offending files to stdout and exits non-zero.
      - name: gofmt
        run: make fmt-check

      # goimports: blocks PRs with incorrect import grouping or unused
      # imports. Same enforcement model as gofmt.
      - name: goimports
        run: make imports-check

      # go vet runs as part of golangci-lint (`govet` linter), but is
      # cheap enough to keep here as an explicit fast-fail too.
      - name: go vet
        run: go vet ./...

      # context.TODO() in production code is forbidden (US-46.5). It means
      # "I don't know what context belongs here" and silently drops deadline
      # propagation. context.Background() is allowed in main/init/background
      # goroutines; context.TODO() is never correct in shipped code.
      - name: context.TODO check
        run: |
          if hits=$(grep -rn 'context.TODO()' --include='*.go' . \
              | grep -v '_test.go' \
              | grep -v 'zz_generated' \
              | grep -v 'sdks/'); then
            echo "$hits"
            echo "FAIL: context.TODO() found in production code. Use the request context or context.Background()."
            exit 1
          fi
          echo "OK: zero context.TODO() in production code"

      # golangci-lint with the curated ruleset in .golangci.yml. Catches
      # the audit-cycle bugs that pre-merge automation could have caught
      # mechanically (errcheck, bodyclose, sqlclosecheck, contextcheck,
      # gosec, staticcheck, etc.). See worklog 0101 for the rationale.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      # Helm chart sanity: chart lints and `helm template` succeeds with
      # the bundled values. Catches undefined-value references and
      # template syntax errors before they break a deploy.
      - name: helm-render
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          make helm-render

      # Smoke-test the developer ergonomics targets so they don't bit-rot.
      # `make pre-commit-fix` and `make recover-stash` exist to keep
      # contributor velocity high (worklog 0126); silently breaking them
      # would defeat the purpose. Both targets are idempotent and
      # read-only enough to run in CI without polluting the working tree.
      - name: pre-commit-fix smoke test
        run: |
          # Should run successfully on a clean tree, applying no changes.
          make pre-commit-fix
          # Verify we didn't accidentally modify anything.
          if ! git diff --quiet; then
            echo "FAIL: pre-commit-fix mutated the tree on a clean checkout"
            git diff --stat
            exit 1
          fi

      - name: recover-stash smoke test
        run: |
          # Should run without error even when there are no dangling commits
          # (which is normal in a fresh checkout). We only care that the
          # target itself doesn't have a syntax error.
          make recover-stash

  test:
    name: Test (-short, with coverage)
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write    # for posting coverage delta as a comment
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch base ref so the coverage-delta comparison can resolve
          # `git merge-base origin/main HEAD`. Default depth=1 doesn't
          # include the base commit, breaking the comparison.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      # helm is required by chart_test.go (charts/llmsafespaces/...). Without
      # it the chart tests silently skip via t.Skip("helm not on PATH").
      # Install before the test run so TestF1–TestF8 and the G16/G26/G2/G5
      # regression suite actually execute on every PR.
      - name: Install helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # Coverage-instrumented test run. -coverpkg=./... means we count
      # coverage for ALL packages, even those without their own _test.go
      # (so a function in pkg/utilities that's exercised by an
      # api/internal/handlers test is properly attributed).
      - name: Run tests with coverage
        run: |
          go test -timeout 300s -race -short \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./... \
            ./...

      - name: Show coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1

      # Hard floor: 50% (current is 51.5% as of worklog 0101). The floor
      # is INTENTIONALLY a hair below current to absorb noise from
      # generated mocks; raise it deliberately as coverage grows.
      - name: Enforce coverage floor (50%)
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          # Use awk for floating-point comparison (bash can't do < for floats)
          if awk -v t="$total" 'BEGIN { exit !(t < 50) }'; then
            echo "FAIL: total coverage ${total}% is below the 50.0% floor."
            echo "If you removed tests, please revisit. If you added uncovered"
            echo "code, write tests. The floor lives in .github/workflows/ci.yml"
            echo "and exists to make coverage regressions visible."
            exit 1
          fi
          echo "OK: total coverage ${total}% (floor 50.0%)"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

      # Post a coverage delta comment on PRs. Requires the base branch's
      # coverage; we generate it freshly rather than caching to keep the
      # comparison apples-to-apples.
      - name: Compare coverage against base
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          base_sha=$(git merge-base origin/main HEAD)
          echo "Base: $base_sha"

          # Generate base coverage in a worktree so we don't disturb HEAD.
          git worktree add /tmp/base-tree "$base_sha"
          (cd /tmp/base-tree && \
            go test -timeout 300s -race -short \
              -coverprofile=coverage-base.out \
              -covermode=atomic \
              -coverpkg=./... \
              ./... 2>/dev/null) || true
          # Run cover -func INSIDE the worktree because the base coverage
          # profile references source files that may have been deleted in
          # this PR (go tool cover needs the source to resolve function
          # boundaries). Running from HEAD would fail on any file deletion.
          base_total=$(cd /tmp/base-tree && go tool cover -func=coverage-base.out | awk '/^total:/ {print $3}' | tr -d '%')
          new_total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          delta=$(awk -v b="$base_total" -v n="$new_total" 'BEGIN { printf "%.2f", n - b }')
          echo "base=${base_total}%  new=${new_total}%  delta=${delta}%"
          {
            echo "COVERAGE_BASE=$base_total"
            echo "COVERAGE_NEW=$new_total"
            echo "COVERAGE_DELTA=$delta"
          } >> "$GITHUB_ENV"

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const base = process.env.COVERAGE_BASE;
            const newC = process.env.COVERAGE_NEW;
            const delta = parseFloat(process.env.COVERAGE_DELTA);
            const sign = delta >= 0 ? '+' : '';
            const emoji = delta >= 0 ? ':white_check_mark:' : ':warning:';
            const body = `## ${emoji} Coverage report\n\n` +
              `| | Coverage |\n` +
              `|---|---|\n` +
              `| base | ${base}% |\n` +
              `| this PR | ${newC}% |\n` +
              `| delta | ${sign}${delta}% |\n\n` +
              `_Floor: 50% (enforced). See .github/workflows/ci.yml._`;

            // Find any existing coverage comment and update it instead
            // of posting a new one each push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## :white_check_mark: Coverage report') ||
              c.user.type === 'Bot' && c.body.startsWith('## :warning: Coverage report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Run go vet
        run: go vet ./...

      - name: Validate OpenAPI spec
        run: make openapi-validate

  # Full-suite test (no -short). The fast `test` job above is sufficient
  # for most PR feedback; this job runs the long tests too, with the race
  # detector. Lives in a separate job so it doesn't gate the fast path
  # but still blocks merge.
  #
  # Why split: today the codebase doesn't actually have any
  # -short-skipped tests, but the gate exists so future contributors
  # can add expensive tests behind `if testing.Short()` without losing
  # CI coverage on them.
  test-full:
    name: Test (full suite, race detector)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      # helm is required by chart_test.go — without it the tests skip silently.
      - name: Install helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run full test suite with race detector
        run: |
          go test -timeout 600s -race -count=1 ./...

  frontend-test:
    name: Frontend (unit + typecheck + e2e)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit + integration tests
        working-directory: frontend
        run: npx vitest run

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e (mocked backend)
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  sdk-contract:
    name: SDK Contract Tests
    runs-on: ubuntu-latest
    needs: [test, test-full, frontend-test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Go SDK — build and test
        working-directory: sdks/go
        run: |
          go build ./...
          go test -timeout 30s -race ./...

      - name: TypeScript SDK — install, typecheck, test, build
        working-directory: sdks/typescript
        run: |
          npm ci
          npx tsc --noEmit
          npx vitest run
          npx tsup src/index.ts --format esm,cjs --dts

      - name: Python SDK — install and test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" -q
          pytest tests/test_client.py tests/test_async_client.py -q

      - name: VS Code extension — install, typecheck, build
        working-directory: sdks/vscode-llmsafespaces
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Install Hurl
        run: |
          curl -sL https://github.com/Orange-OpenSource/hurl/releases/download/5.0.1/hurl-5.0.1-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp
          echo "/tmp/hurl-5.0.1-x86_64-unknown-linux-gnu/bin" >> "$GITHUB_PATH"

      - name: Hurl contract tests against Prism mock
        working-directory: sdks
        continue-on-error: true
        run: make contract-test-mock

  # SDK Canary CI — runs the ci:fast (Tier 1 shallow) canary scenarios
  # against the local API server. These scenarios do not require a live
  # Kubernetes cluster, LLM credentials, or waiting for pod scheduling.
  # They verify auth, CRUD, error shapes, and SDK parsing regressions.
  sdk-canary:
    name: SDK Canary (ci:fast scenarios)
    runs-on: ubuntu-latest
    needs: [sdk-contract]
    if: false # Disabled: requires seeded accounts not yet committed (issue #27)
    # Non-blocking: canary scenarios that require seeded accounts (valid-key,
    # login flows, workspace CRUD) will fail until seed-accounts source is
    # committed to the repo (tracked in issue #27). Health, error-shape, and
    # unauthenticated tests pass. Marked continue-on-error so canary failures
    # do not block merges; regressions are visible in the check detail.
    continue-on-error: true
    # Most canary scenario steps run inside the canary sub-module.
    # Steps that need the repo root override working-directory individually.
    defaults:
      run:
        working-directory: sdks/canary/go
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: llmsafespaces
          POSTGRES_USER: llmsafespaces
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Build the API server binary and run migrations
      - name: Build API server
        working-directory: ${{ github.workspace }}
        run: go build -o /tmp/llmsafespaces-api ./api/cmd/api/

      - name: Run DB migrations
        working-directory: ${{ github.workspace }}
        run: |
          # Install golang-migrate CLI and run migrations
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path api/migrations -database "postgres://llmsafespaces:changeme@localhost:5432/llmsafespaces?sslmode=disable" up

      # Start the API server in the background.
      # We write a stub kubeconfig pointing at a non-existent server so the
      # kubernetes client initialises without in-cluster creds. The canary
      # ci:fast scenarios only exercise auth, CRUD, secrets, and session
      # endpoints — none of which schedule real workspace pods.
      - name: Start API server
        working-directory: ${{ github.workspace }}
        env:
          # Database: individual fields (the API does not accept a connection URL)
          LLMSAFESPACES_DATABASE_HOST: "localhost"
          LLMSAFESPACES_DATABASE_PORT: "5432"
          LLMSAFESPACES_DATABASE_USER: "llmsafespaces"
          LLMSAFESPACES_DATABASE_PASSWORD: "changeme"
          LLMSAFESPACES_DATABASE_DATABASE: "llmsafespaces"
          # Redis
          LLMSAFESPACES_REDIS_HOST: "localhost"
          LLMSAFESPACES_REDIS_PORT: "6379"
          # Auth: the API reads LLMSAFESPACES_AUTH_JWTSECRET (not JWT_SECRET)
          LLMSAFESPACES_AUTH_JWTSECRET: canary-ci-jwt-secret-not-for-production
          # DEK master key for secrets encryption (optional — uses no-op if absent)
          LLMSAFESPACES_DEK_MASTER_KEY: "63616e6172792d63692d6d61737465722d6b65792d33326279746573303030"
          LLMSAFESPACES_PORT: "8080"
          LLMSAFESPACES_KUBERNETES_INCLUSTER: "false"
          LLMSAFESPACES_KUBERNETES_CONFIGPATH: "/tmp/ci-kubeconfig.yaml"
          CONFIG_PATH: "api/config/config.yaml"
          # Development mode: disables RequireHTTPS so canary can use plain HTTP.
          LLMSAFESPACES_LOGGING_DEVELOPMENT: "true"
        run: |
          # Stub kubeconfig — API client initialises but no real cluster exists.
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Config' \
            'clusters:' \
            '- cluster:' \
            '    server: http://127.0.0.1:19999' \
            '  name: ci-stub' \
            'contexts:' \
            '- context:' \
            '    cluster: ci-stub' \
            '    user: ci-user' \
            '  name: ci-context' \
            'current-context: ci-context' \
            'users:' \
            '- name: ci-user' \
            '  user: {}' \
            > /tmp/ci-kubeconfig.yaml
          /tmp/llmsafespaces-api &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          # Wait up to 30s for the API to become ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/readyz >/dev/null 2>&1; then
              echo "API server ready after ${i}s"
              break
            fi
            sleep 1
          done

      # Seed test accounts
      - name: Seed canary test accounts
        run: |
          go run ./cmd/seed-accounts/ \
            --url http://localhost:8080 \
            --out /tmp/canary-keys.env
        continue-on-error: true  # seed may fail if accounts exist (idempotent)

      - name: Load canary API keys
        run: |
          if [ -f /tmp/canary-keys.env ]; then
            source /tmp/canary-keys.env
            echo "LLMSAFESPACES_API_KEY=${CANARY_API_KEY_1}" >> "$GITHUB_ENV"
            echo "LLMSAFESPACES_API_KEY_USER2=${CANARY_API_KEY_2}" >> "$GITHUB_ENV"
            echo "LLMSAFESPACES_EMAIL=canary1@llmsafespaces.test" >> "$GITHUB_ENV"
            echo "LLMSAFESPACES_PASSWORD=${CANARY_PASSWORD_1}" >> "$GITHUB_ENV"
          fi

      # ── Go SDK canaries ────────────────────────────────────────────────────
      - name: Go canary — S-HEALTH
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-health/
        continue-on-error: false

      - name: Go canary — S-AUTH
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-auth/

      - name: Go canary — S-AUTH-CONFIG
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-auth-config/

      - name: Go canary — S-LOGOUT
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-logout/

      - name: Go canary — S-APIKEY
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-apikey/

      - name: Go canary — S-WS-CRUD
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-ws-crud/

      - name: Go canary — S-WS-STATUS
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-ws-status/

      - name: Go canary — S-SECRET-CRUD
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-secret-crud/

      - name: Go canary — S-SECRET-REVEAL
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-secret-reveal/

      - name: Go canary — S-SECRET-AUDIT
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-secret-audit/

      - name: Go canary — S-SECRET-BINDINGS
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-secret-bindings/

      - name: Go canary — S-ENV-VARS
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-env-vars/

      - name: Go canary — S-CRED-CRUD
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-cred-crud/

      - name: Go canary — S-OWNERSHIP
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-ownership/

      - name: Go canary — S-USER-SETTINGS
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-user-settings/

      - name: Go canary — S-ERROR-FORMAT
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: go run ./scenarios/s-error-format/

      # ── Python SDK canaries (all ci:fast scenarios) ────────────────────────
      - name: Python SDK install
        working-directory: sdks/python
        run: pip install -e ".[dev]" httpx -q

      - name: Python canaries — all ci:fast scenarios
        working-directory: ${{ github.workspace }}
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: |
          set -e
          for scenario in \
            s_health s_auth s_auth_config s_logout s_apikey s_user_settings \
            s_ws_crud s_ws_status s_secret_crud s_secret_reveal s_secret_audit \
            s_secret_bindings s_env_vars s_cred_crud s_error_format s_ownership; do
            echo "--- Python: $scenario ---"
            python sdks/canary/python/scenarios/${scenario}.py
          done

      # ── TypeScript SDK canaries (all ci:fast scenarios) ────────────────────
      - name: TypeScript SDK install and build
        working-directory: sdks/typescript
        run: |
          npm ci
          npx tsup src/index.ts --format esm,cjs --dts

      - name: TypeScript canaries — all ci:fast scenarios
        working-directory: ${{ github.workspace }}
        env:
          LLMSAFESPACES_URL: http://localhost:8080
        run: |
          set -e
          for scenario in \
            s-health s-auth s-auth-config s-logout s-apikey s-user-settings \
            s-ws-crud s-ws-status s-secret-crud s-secret-reveal s-secret-audit \
            s-secret-bindings s-env-vars s-cred-crud s-error-format s-ownership; do
            echo "--- TypeScript: $scenario ---"
            npx tsx sdks/canary/typescript/scenarios/${scenario}.ts
          done

      # ── MCP server canaries ────────────────────────────────────────────────
      - name: Build MCP binary
        working-directory: ${{ github.workspace }}
        run: go build -o /tmp/mcp-binary ./cmd/mcp/

      - name: MCP canary — S-MCP-TOOLS + S-MCP-AUTH-NEG + S-MCP-CRED + S-MCP-INPUT-NEG
        working-directory: ${{ github.workspace }}
        env:
          LLMSAFESPACES_URL: http://localhost:8080
          MCP_BINARY: /tmp/mcp-binary
        run: go run ./sdks/canary/mcp/

      - name: Stop API server
        if: always()
        run: kill $API_PID 2>/dev/null || true

  # Compute a single unix timestamp shared by all image-build jobs in this run
  # so every artifact built from one workflow invocation carries the same
  # `ts-<unix>` tag. Sortable lexicographically as a 10-digit number until
  # 2286-11-20 (year 9999999999 fits in 10 digits through 2286). Combined with
  # `sha-<commit>` for content addressability and `dev` for the moving pointer
  # to the latest main build. Tagged releases (v1.2.3) emit semver tags.
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.timestamp }}
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

  build-api:
    name: Build API (${{ matrix.platform }})
    needs: [test, test-full, prepare]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: api/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.API_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=api-${{ matrix.platform }}
          cache-to: type=gha,scope=api-${{ matrix.platform }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
