name: Release

# Tag-triggered release pipeline. Cuts a real release when a `v*.*.*` tag
# is pushed:
#
#   1. CI workflow already builds and pushes images (api, controller,
#      frontend, relay-router, relay-proxy, base) to ghcr.io with semver
#      tags. This workflow waits for CI to complete.
#   2. Packages the Helm chart and publishes to the gh-pages branch's
#      Helm repo via chart-releaser.
#   3. Generates SBOM (CycloneDX) from each built image via syft.
#   4. Creates a GitHub Release with notes pulled from CHANGELOG.md.
#
# Tagging a release:
#
#   make release-tag VERSION=0.3.0
#
# The release notes are the section of CHANGELOG.md matching the tag. If the
# section is missing, the workflow fails — CHANGELOG.md is the source of
# truth for what shipped.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-release (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write   # for creating the GitHub Release + gh-pages push
  packages: write   # for signing images + reading image metadata
  id-token: write   # for cosign keyless OIDC signing

env:
  REGISTRY: ghcr.io
  API_IMAGE: lenaxia/llmsafespaces/api
  CONTROLLER_IMAGE: lenaxia/llmsafespaces/controller
  RUNTIME_IMAGE: lenaxia/llmsafespaces/base
  FRONTEND_IMAGE: lenaxia/llmsafespaces/frontend
  RELAY_ROUTER_IMAGE: lenaxia/llmsafespaces/relay-router
  RELAY_PROXY_IMAGE: lenaxia/llmsafespaces/relay-proxy

jobs:
  # Gate: refuse to release a tag whose CHANGELOG section is missing.
  # Also resolves the canonical VERSION + REF for downstream jobs.
  verify-changelog:
    name: Verify CHANGELOG section exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve version and ref
        id: resolve
        env:
          # Pass through env, not interpolation, to avoid shell injection
          # from a malicious workflow_dispatch input (only triggerable by
          # repo write users, but defense-in-depth).
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # workflow_dispatch: INPUT_TAG is "v0.3.0" or "0.3.0" — normalize.
          # tag push: github.ref is "refs/tags/v0.3.0".
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
            # Strip optional leading "v"
            version="${tag#v}"
            # Resolve to the canonical tag ref.
            ref="refs/tags/v${version}"
          else
            ref="${{ github.ref }}"
            version="${ref#refs/tags/v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${version}, ref=${ref}"

      - name: Check CHANGELOG section exists
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          if ! grep -E "^## \[${VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md >/dev/null; then
            echo "::error::CHANGELOG.md is missing a section for v${VERSION}."
            echo "::error::Add a heading like '## [${VERSION}] - $(date -u +%Y-%m-%d)' with the release notes."
            exit 1
          fi
          echo "CHANGELOG section for v${VERSION} found."

  # Gate: wait for the CI workflow to finish successfully on this tag.
  # Images are built by CI; this release workflow only packages the chart,
  # generates SBOM, and creates the Release.
  #
  # We don't wait for specific check names (e.g. "Merge API Manifest")
  # because lewagon/wait-on-check-action fails when the named check doesn't
  # exist yet — and CI's merge jobs only START after their build dependencies
  # finish (10+ min into the run). Instead we wait for ALL checks on the ref
  # to complete, filtering to ignore the Release workflow's own jobs.
  wait-for-ci:
    name: Wait for CI workflow
    needs: verify-changelog
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all CI checks to complete
        uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ needs.verify-changelog.outputs.ref }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          running-workflow-name: "Wait for CI workflow"

  # Sign all built images with cosign keyless (OIDC). Each signature is
  # recorded in the public Rekor transparency log, so anyone can verify
  # image provenance after the fact:
  #
  #   cosign verify ghcr.io/lenaxia/llmsafespaces/api:0.3.0 \
  #     --certificate-identity-regexp "https://github.com/lenaxia/LLMSafeSpaces" \
  #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
  sign-images:
    name: Sign images (cosign keyless)
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.verify-changelog.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign each image
        # cosign sign with keyless OIDC: the OIDC token from GitHub Actions
        # is used to get a short-lived certificate from Fulcio. The identity
        # and issuer are automatically embedded in the certificate — we don't
        # pass them as flags (those are for `cosign verify`, not `cosign sign`).
        # The signature is recorded in Rekor automatically.
        run: |
          for img in api controller base frontend relay-router relay-proxy; do
            case "$img" in
              api) image_ref="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${VERSION}" ;;
              controller) image_ref="${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}:${VERSION}" ;;
              base) image_ref="${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}:${VERSION}" ;;
              frontend) image_ref="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}" ;;
              relay-router) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_ROUTER_IMAGE }}:${VERSION}" ;;
              relay-proxy) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_PROXY_IMAGE }}:${VERSION}" ;;
            esac
            echo "Signing ${image_ref}"
            cosign sign --yes "${image_ref}"
          done

  # Scan each built image with Trivy. Fail on HIGH/CRITICAL CVEs.
  # This complements the filesystem/config scan in security-scan.yml —
  # that scan covers source files; this scan covers the actual OCI images
  # (catches vulns in base images, installed packages, etc.).
  scan-images:
    name: Scan images (Trivy)
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.verify-changelog.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        run: |
          curl -sLO https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz
          tar xzf trivy_0.70.0_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      - name: Scan each image
        # Control-plane images (api/controller/frontend/relay-router/relay-proxy)
        # gate the release: a HIGH/CRITICAL finding in any of these blocks
        # the GitHub Release from being cut.
        #
        # The base runtime image is treated as a warning surface. The base
        # is the workspace runtime — user code executes inside it — and it
        # inherits Debian bookworm's CVE backlog. The vast majority of
        # HIGH/CRITICAL findings there are `fix_deferred` or `will_not_fix`
        # upstream; Debian has not shipped fixed packages yet. Failing the
        # release on every bookworm CVE would prevent any release from
        # going out while Debian catches up. Instead we surface the
        # findings as a warning annotation and let the release proceed.
        #
        # Operators with stricter requirements can:
        #   - Build a custom base with newer packages (runtimeEnvironments).
        #   - Use a distroless/mutable base via runtimeEnvironments overrides.
        #   - Wait for Debian bookworm's next point release.
        run: |
          fail=0
          for img in api controller base frontend relay-router relay-proxy; do
            case "$img" in
              api) image_ref="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${VERSION}" ;;
              controller) image_ref="${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}:${VERSION}" ;;
              base) image_ref="${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}:${VERSION}" ;;
              frontend) image_ref="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}" ;;
              relay-router) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_ROUTER_IMAGE }}:${VERSION}" ;;
              relay-proxy) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_PROXY_IMAGE }}:${VERSION}" ;;
            esac
            echo "::group::Scanning ${image_ref}"

            if [ "$img" = "base" ]; then
              # Base (workspace runtime): surface findings but do not block.
              # First run prints the full table for the workflow log.
              trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --ignorefile .trivyignore \
                "${image_ref}" || exit 1  # only fail on infrastructure error
              # Second run with --exit-code 1 detects whether HIGH/CRITICAL
              # were present (suppressed output) and emits a workflow
              # warning annotation for visibility.
              if ! trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 1 \
                --ignorefile .trivyignore \
                "${image_ref}" >/dev/null 2>&1; then
                echo "::warning::Trivy found HIGH/CRITICAL vulnerabilities in ${image_ref} (base runtime image, treated as warning — see scan table above)"
              fi
            else
              # Control-plane: fail the job on HIGH/CRITICAL.
              if ! trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 1 \
                --ignorefile .trivyignore \
                "${image_ref}"; then
                echo "::error::Trivy found HIGH/CRITICAL vulnerabilities in ${image_ref}"
                fail=1
              fi
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

  # Package the Helm chart and publish to the gh-pages branch's Helm repo.
  # chart-releaser-action independently discovers, packages, and publishes
  # charts from charts/ using Chart.yaml's version field — no manual
  # `helm package` step needed (and one was previously dead code).
  publish-chart:
    name: Publish Helm chart
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Publish to gh-pages Helm repo
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Generate SBOM (CycloneDX) for each image. Attached to the GitHub Release
  # as a release artifact so consumers can feed it into dependency-track,
  # grype, or similar.
  generate-sbom:
    name: Generate SBOM
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.27.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM for each image
        env:
          # CI's docker/metadata-action uses type=semver,pattern={{version}}
          # which produces "0.3.0" (no "v" prefix). Match that format.
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          mkdir -p sbom-out
          for img in api controller base frontend relay-router relay-proxy; do
            case "$img" in
              api) image_ref="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${VERSION}" ;;
              controller) image_ref="${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}:${VERSION}" ;;
              base) image_ref="${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}:${VERSION}" ;;
              frontend) image_ref="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}" ;;
              relay-router) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_ROUTER_IMAGE }}:${VERSION}" ;;
              relay-proxy) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_PROXY_IMAGE }}:${VERSION}" ;;
            esac
            echo "Generating SBOM for ${image_ref}"
            syft "${image_ref}" -o cyclonedx-json > "sbom-out/${img}-${VERSION}.sbom.json"
          done

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.verify-changelog.outputs.version }}
          path: sbom-out/*.json
          retention-days: 90

  # Build relay-proxy binaries for the multi-cloud inference relay fleet
  # (Epic 42). These are distributed to relay VMs via cloud-init with
  # SHA-256 verification. Attach to the GitHub Release so operators can
  # download them and wire them into controller.inferenceRelay.artifact.
  build-relay-binaries:
    name: Build relay-proxy binaries
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p deploy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o deploy/relay-proxy-arm64 ./cmd/relay-proxy/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o deploy/relay-proxy-amd64 ./cmd/relay-proxy/

      - name: Generate checksums
        run: |
          cd deploy
          sha256sum relay-proxy-arm64 relay-proxy-amd64 > checksums.txt

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-binaries-${{ needs.verify-changelog.outputs.version }}
          path: |
            deploy/relay-proxy-arm64
            deploy/relay-proxy-amd64
            deploy/checksums.txt
          retention-days: 7

  # Create the GitHub Release with notes from CHANGELOG.md.
  create-release:
    name: Create GitHub Release
    needs: [verify-changelog, wait-for-ci, sign-images, scan-images, publish-chart, generate-sbom, build-relay-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\] -" { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes are empty for v${VERSION}."
            exit 1
          fi

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v8
        with:
          name: sbom-${{ needs.verify-changelog.outputs.version }}
          path: sbom-out

      - name: Download relay binaries
        uses: actions/download-artifact@v8
        with:
          name: relay-binaries-${{ needs.verify-changelog.outputs.version }}
          path: relay-out

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          cat > release-body.md <<EOF
          ## Images

          | Component | Image |
          |---|---|
          | API | \`ghcr.io/lenaxia/llmsafespaces/api:${VERSION}\` |
          | Controller | \`ghcr.io/lenaxia/llmsafespaces/controller:${VERSION}\` |
          | Runtime base | \`ghcr.io/lenaxia/llmsafespaces/base:${VERSION}\` |
          | Frontend | \`ghcr.io/lenaxia/llmsafespaces/frontend:${VERSION}\` |
          | Relay router | \`ghcr.io/lenaxia/llmsafespaces/relay-router:${VERSION}\` |
          | Relay proxy | \`ghcr.io/lenaxia/llmsafespaces/relay-proxy:${VERSION}\` |

          All images are signed with cosign keyless (OIDC). Verify:

          \`\`\`bash
          cosign verify ghcr.io/lenaxia/llmsafespaces/api:${VERSION} \\
            --certificate-identity-regexp "https://github.com/lenaxia/LLMSafeSpaces" \\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          \`\`\`

          ## Install

          \`\`\`bash
          helm repo add llmsafespaces https://lenaxia.github.io/LLMSafeSpaces/
          helm repo update
          helm install llmsafespaces llmsafespaces/llmsafespaces --version ${VERSION}
          \`\`\`

          ## Relay proxy binaries

          For the self-hosted multi-cloud inference relay fleet (Epic 42).
          Set \`controller.inferenceRelay.artifact.urls\` in Helm values to
          the download URL below, and \`sha256Arm64\`/\`sha256Amd64\` from
          \`checksums.txt\`.

          SBOM (CycloneDX JSON) for each image is attached below.

          ---

          EOF
          cat release-notes.md >> release-body.md

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-body.md \
            --verify-tag

      - name: Attach SBOM + relay binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          for f in sbom-out/*.json relay-out/*; do
            gh release upload "v${VERSION}" "$f"
          done
