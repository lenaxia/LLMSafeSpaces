name: Release

# Tag-triggered release pipeline. Cuts a real release when a `v*.*.*` tag
# is pushed:
#
#   1. CI workflow already builds and pushes images (api, controller,
#      frontend, relay-router, relay-proxy, base) to ghcr.io with semver
#      tags. This workflow waits for CI to complete.
#   2. Packages the Helm chart as a .tgz and publishes to the gh-pages
#      branch's Helm repo ( alongside previously-released charts).
#   3. Generates SBOM (CycloneDX) from each built image via syft.
#   4. Creates a GitHub Release with notes pulled from CHANGELOG.md.
#
# Tagging a release:
#
#   git tag -a v0.3.0 -m "v0.3.0"
#   git push origin v0.3.0
#
# The release notes are the section of CHANGELOG.md matching the tag. If the
# section is missing, the workflow fails — CHANGELOG.md is the source of
# truth for what shipped.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist)"
        required: true
        type: string

permissions:
  contents: write   # for creating the GitHub Release + gh-pages push
  packages: write   # for reading image metadata from ghcr.io

env:
  REGISTRY: ghcr.io
  API_IMAGE: lenaxia/llmsafespaces/api
  CONTROLLER_IMAGE: lenaxia/llmsafespaces/controller
  RUNTIME_IMAGE: lenaxia/llmsafespaces/base
  FRONTEND_IMAGE: lenaxia/llmsafespaces/frontend
  RELAY_ROUTER_IMAGE: lenaxia/llmsafespaces/relay-router
  RELAY_PROXY_IMAGE: lenaxia/llmsafespaces/relay-proxy

jobs:
  # Gate: refuse to release a tag whose CHANGELOG section is missing.
  verify-changelog:
    name: Verify CHANGELOG section exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for tag lookup

      - name: Resolve version from tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            ref="refs/tags/${{ inputs.tag }}"
          else
            ref="${{ github.ref }}"
          fi
          version="${ref#refs/tags/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${version}"

      - name: Check CHANGELOG section exists
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Look for the heading "## [${VERSION}] - <date>" in CHANGELOG.md.
          if ! grep -E "^## \[${VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md >/dev/null; then
            echo "::error::CHANGELOG.md is missing a section for v${VERSION}."
            echo "::error::Add a heading like '## [${VERSION}] - $(date -u +%Y-%m-%d)' with the release notes."
            exit 1
          fi
          echo "CHANGELOG section for v${VERSION} found."

  # Gate: wait for the CI workflow to finish successfully on this tag.
  # Images are built by CI; this release workflow only packages the chart,
  # generates SBOM, and creates the Release.
  wait-for-ci:
    name: Wait for CI workflow
    needs: verify-changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for CI workflow conclusion
        uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ github.sha }}
          check-name: "Lint"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for full test suite
        uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ github.sha }}
          check-name: "Test (full suite, race detector)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for image builds
        uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ github.sha }}
          check-name: "Merge API Manifest"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  # Package the Helm chart as a .tgz and publish to the gh-pages branch's
  # Helm repo. This is what lets operators `helm repo add llmsafespaces
  # https://lenaxia.github.io/LLMSafeSpaces/` and `helm install`.
  publish-chart:
    name: Publish Helm chart
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Package chart
        env:
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          mkdir -p chart-out
          helm package charts/llmsafespaces \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination chart-out

      - name: Publish to gh-pages Helm repo
        uses: helm/chart-releaser-action@v1.7.1
        with:
          charts_dir: charts
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Generate SBOM (CycloneDX) for each image. Attached to the GitHub Release
  # as a release artifact so consumers can feed it into dependency-track,
  # grype, or similar.
  generate-sbom:
    name: Generate SBOM
    needs: [verify-changelog, wait-for-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.27.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM for each image
        env:
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          mkdir -p sbom-out
          for img in api controller base frontend relay-router relay-proxy; do
            case "$img" in
              api) image_ref="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${VERSION}" ;;
              controller) image_ref="${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}:${VERSION}" ;;
              base) image_ref="${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}:${VERSION}" ;;
              frontend) image_ref="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}" ;;
              relay-router) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_ROUTER_IMAGE }}:${VERSION}" ;;
              relay-proxy) image_ref="${{ env.REGISTRY }}/${{ env.RELAY_PROXY_IMAGE }}:${VERSION}" ;;
            esac
            echo "Generating SBOM for ${image_ref}"
            syft "${image_ref}" -o cyclonedx-json > "sbom-out/${img}-${VERSION}.sbom.json"
          done

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.verify-changelog.outputs.version }}
          path: sbom-out/*.json
          retention-days: 90

  # Create the GitHub Release with notes from CHANGELOG.md.
  create-release:
    name: Create GitHub Release
    needs: [verify-changelog, wait-for-ci, publish-chart, generate-sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          # Extract the body of the section between "## [${VERSION}] - <date>"
          # and the next "## " heading. The awk script:
          #   - skips lines until it finds the target section
          #   - prints lines until it hits the next "## "
          #   - exits
          awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\] -" { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes are empty for v${VERSION}."
            exit 1
          fi

          echo "## Release notes preview:"
          cat release-notes.md

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v8
        with:
          name: sbom-${{ needs.verify-changelog.outputs.version }}
          path: sbom-out

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          # Build a body that prepends an image-reference table to the
          # CHANGELOG notes, so consumers can see what was published.
          cat > release-body.md <<EOF
          ## Images

          | Component | Image |
          |---|---|
          | API | \`ghcr.io/lenaxia/llmsafespaces/api:v${VERSION}\` |
          | Controller | \`ghcr.io/lenaxia/llmsafespaces/controller:v${VERSION}\` |
          | Runtime base | \`ghcr.io/lenaxia/llmsafespaces/base:v${VERSION}\` |
          | Frontend | \`ghcr.io/lenaxia/llmsafespaces/frontend:v${VERSION}\` |
          | Relay router | \`ghcr.io/lenaxia/llmsafespaces/relay-router:v${VERSION}\` |
          | Relay proxy | \`ghcr.io/lenaxia/llmsafespaces/relay-proxy:v${VERSION}\` |

          ## Install

          \`\`\`bash
          helm repo add llmsafespaces https://lenaxia.github.io/LLMSafeSpaces/
          helm repo update
          helm install llmsafespaces llmsafespaces/llmsafespaces --version ${VERSION}
          \`\`\`

          SBOM (CycloneDX JSON) for each image is attached below.

          ---

          EOF
          cat release-notes.md >> release-body.md

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-body.md \
            --verify-tag

      - name: Attach SBOM artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-changelog.outputs.version }}
        run: |
          for f in sbom-out/*.json; do
            gh release upload "v${VERSION}" "$f"
          done
