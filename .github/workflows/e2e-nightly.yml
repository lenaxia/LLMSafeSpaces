name: E2E Nightly (kind)

on:
  schedule:
    # Run at 06:00 UTC daily (10pm PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

env:
  CLUSTER_NAME: llmsafespaces-ci
  IMAGE_TAG: ci
  NS: llmsafespaces

jobs:
  e2e-kind:
    name: Full system E2E (kind cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kind cluster
        run: kind create cluster --config local/kind-cluster.yaml --name $CLUSTER_NAME

      - name: Build and load images
        run: |
          docker build --network host -f api/Dockerfile -t llmsafespaces/api:$IMAGE_TAG .
          docker build --network host -f controller/Dockerfile -t llmsafespaces/controller:$IMAGE_TAG .
          docker build --network host -f runtimes/base/Dockerfile -t llmsafespaces/runtime-base:$IMAGE_TAG .

          kind load docker-image llmsafespaces/api:$IMAGE_TAG --name $CLUSTER_NAME
          kind load docker-image llmsafespaces/controller:$IMAGE_TAG --name $CLUSTER_NAME
          kind load docker-image llmsafespaces/runtime-base:$IMAGE_TAG --name $CLUSTER_NAME

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.0/cert-manager.yaml
          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=180s

      - name: Deploy Postgres + Redis
        run: |
          kubectl apply -f local/postgres-redis.yaml
          kubectl -n $NS rollout status deployment/postgres --timeout=180s
          kubectl -n $NS rollout status deployment/valkey --timeout=180s

      - name: Helm install LLMSafeSpaces
        run: |
          # MCP is disabled in the nightly e2e: the cmd/mcp binary has no
          # Dockerfile yet so there is no image to pull. The MCP pod readiness
          # and connectivity steps below are skipped when mcp.enabled=false.
          # Re-enable once a Dockerfile is added (tracked in issue #28).
          helm upgrade --install llmsafespaces charts/llmsafespaces \
            -n $NS --create-namespace \
            --set api.image.repository=llmsafespaces/api \
            --set api.image.tag=$IMAGE_TAG \
            --set api.image.pullPolicy=IfNotPresent \
            --set controller.image.repository=llmsafespaces/controller \
            --set controller.image.tag=$IMAGE_TAG \
            --set controller.image.pullPolicy=IfNotPresent \
            --set mcp.enabled=false \
            --set postgresql.host=postgres \
            --set postgresql.port=5432 \
            --set postgresql.user=llmsafespaces \
            --set postgresql.database=llmsafespaces \
            --set redis.host=redis-master \
            --set redis.port=6379 \
            --set externalSecret.create=true \
            --set "externalSecret.postgresPassword=changeme" \
            --set api.config.logging.development=true \
            --wait --timeout 5m

      - name: Wait for rollout
        run: |
          kubectl -n $NS rollout status deployment/llmsafespaces-api --timeout=180s
          kubectl -n $NS rollout status deployment/llmsafespaces-controller --timeout=180s

      # F1/F2/F3 runtime verification — skipped until MCP image exists (issue #28).
      # The helm render unit tests (TestF1/TestF2/TestF3) cover the template
      # layer on every PR. This step validates the running pod once buildable.
      - name: E2E — MCP pod readiness (F1/F2/F3 runtime verification)
        if: false  # Re-enable when cmd/mcp Dockerfile added (issue #28)
        run: |
          set -euo pipefail
          NS=${{ env.NS }}

          # Assert MCP pod is Running and Ready (not just Pending/CrashLoop).
          MCP_READY=$(kubectl -n "$NS" get pods \
            -l app.kubernetes.io/component=mcp \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
          if [[ "$MCP_READY" != "true" ]]; then
            echo "FAIL: MCP pod not Ready — likely PSA rejection (F3) or probe hang (F2)"
            kubectl -n "$NS" describe pod -l app.kubernetes.io/component=mcp || true
            exit 1
          fi
          echo "OK: MCP pod is Ready"

          # Assert MCP pod is in the correct namespace (F1 regression check).
          MCP_NS=$(kubectl -n "$NS" get pod \
            -l app.kubernetes.io/component=mcp \
            -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo "")
          if [[ "$MCP_NS" != "$NS" ]]; then
            echo "FAIL: MCP pod is in namespace '$MCP_NS', expected '$NS' (F1 namespace fix regression)"
            exit 1
          fi
          echo "OK: MCP pod is in namespace $NS (F1)"

          # Port-forward to the MCP Service and verify the /sse endpoint accepts
          # a TCP connection (matching the tcpSocket probe semantics from F2).
          kubectl -n "$NS" port-forward svc/llmsafespaces-mcp 13001:3001 >/dev/null 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT

          for i in $(seq 1 10); do
            if nc -z 127.0.0.1 13001 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if ! nc -z 127.0.0.1 13001 2>/dev/null; then
            echo "FAIL: MCP Service port 3001 not reachable after 10s (F2 probe regression?)"
            exit 1
          fi
          echo "OK: MCP Service port 3001 accepting connections (F2)"
          kill $PF_PID 2>/dev/null || true

      # F8 regression test at runtime: verify that a pod labeled
      # component=migrate can reach Valkey:6379 (the new allow rule),
      # and that a pod without that label cannot (the policy is enforced).
      # Runs as a Job with the correct labels so the NetworkPolicy allows it.
      - name: E2E — Valkey migrate-rule connectivity (F8 runtime verification)
        run: |
          set -euo pipefail
          NS=${{ env.NS }}

          # Get the Valkey ClusterIP.
          VALKEY_IP=$(kubectl -n "$NS" get svc \
            -l app=valkey \
            -o jsonpath='{.items[0].spec.clusterIP}' 2>/dev/null || echo "")
          if [[ -z "$VALKEY_IP" ]]; then
            echo "SKIP: valkey Service not found; skipping F8 connectivity check"
            exit 0
          fi

          # Run a one-shot Job pod labeled as a migrate Job. The NetworkPolicy
          # now allows this pod to reach Valkey:6379 (F8 fix).
          kubectl -n "$NS" run valkey-migrate-probe \
            --image=busybox:1.36 \
            --restart=Never \
            --labels="app.kubernetes.io/component=migrate,app.kubernetes.io/instance=llmsafespaces" \
            --command -- sh -c "nc -z -w5 $VALKEY_IP 6379 && echo REACHABLE || echo BLOCKED"

          # Wait for completion.
          for i in $(seq 1 30); do
            PHASE=$(kubectl -n "$NS" get pod valkey-migrate-probe \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            [[ "$PHASE" == "Succeeded" || "$PHASE" == "Failed" ]] && break
            sleep 2
          done

          RESULT=$(kubectl -n "$NS" logs valkey-migrate-probe 2>/dev/null || echo "")
          kubectl -n "$NS" delete pod valkey-migrate-probe --ignore-not-found >/dev/null 2>&1 || true

          if [[ "$RESULT" != *"REACHABLE"* ]]; then
            echo "FAIL: migrate-labeled pod could not reach Valkey:6379 (F8 regression — NetworkPolicy blocking migrate Job)"
            echo "Result: $RESULT"
            exit 1
          fi
          echo "OK: migrate-labeled pod reached Valkey:6379 (F8)"

      - name: Run e2e test suite
        env:
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          CTX: kind-${{ env.CLUSTER_NAME }}
          NS: ${{ env.NS }}
          RUNTIME_IMAGE_REF: llmsafespaces/runtime-base:ci
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: bash local/test.sh

      - name: Run startup latency benchmarks (S18.10)
        # Benchmarks require LLM credentials so workspaces can reach Active.
        # Conservative CI thresholds catch gross regressions (e.g. re-adding
        # the provider-connectivity readyz gate) without being sensitive to
        # kind cluster resource noise. Tighten after S18.11 baseline is set.
        if: ${{ env.LLM_API_KEY != '' }}
        env:
          NS: ${{ env.NS }}
          API_URL: http://localhost:30080
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          echo "=== Resume benchmark ==="
          bash hack/benchmark-resume.sh \
            --iterations 3 \
            --namespace "$NS" \
            --api-url "$API_URL" \
            --api-key "$LLM_API_KEY" \
            --assert \
            --max-p99-total 180 \
            --max-p99-pod-to-readyz 30 \
            2>&1 | tee /tmp/bench-resume.txt

          echo ""
          echo "=== Create benchmark (no packages) ==="
          bash hack/benchmark-create.sh \
            --iterations 3 \
            --namespace "$NS" \
            --api-url "$API_URL" \
            --api-key "$LLM_API_KEY" \
            --assert \
            --max-p99-total 180 \
            2>&1 | tee /tmp/bench-create.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            /tmp/bench-resume.txt
            /tmp/bench-create.txt
          retention-days: 90

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl -n $NS get pods -o wide
          echo "=== API logs ==="
          kubectl -n $NS logs deployment/llmsafespaces-api --tail=50 || true
          echo "=== Controller logs ==="
          kubectl -n $NS logs deployment/llmsafespaces-controller --tail=50 || true
          echo "=== Events ==="
          kubectl -n $NS get events --sort-by='.lastTimestamp' | tail -30

      - name: Teardown
        if: always()
        run: kind delete cluster --name $CLUSTER_NAME
