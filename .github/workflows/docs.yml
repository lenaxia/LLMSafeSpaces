name: Docs

# Build the MkDocs site and publish to gh-pages alongside the Helm chart.
# Deploy shape (Option A per docs/mkdocs-site discussion):
#   gh-pages branch root:
#     /                    ← MkDocs rendered site
#     /index.yaml          ← Helm chart index (chart-releaser publishes this on tag)
#     /llmsafespaces-*.tgz
#
# Both docs and chart live at the gh-pages root. Operators keep using
# `helm repo add llmsafespaces https://lenaxia.github.io/LLMSafeSpaces/`
# (no URL change from pre-docs state).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    paths:
      - 'pkg/apis/llmsafespaces/v1/*_types.go'
      - 'cmd/crd-doc-gen/**'
      - 'helm/values.yaml'
      - 'cmd/helm-values-gen/**'
  workflow_dispatch:

permissions:
  contents: write   # for pushing to gh-pages

jobs:
  # Check that generated docs haven't drifted from source.
  doc-drift:
    name: Docs drift check
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify CRD docs match Go types
        run: |
          go run ./cmd/crd-doc-gen -w
          if ! git diff --exit-code docs/reference/crds.md; then
            echo ""
            echo "CRD docs are out of sync with Go types."
            echo "To fix: update the Go doc comments in pkg/apis/llmsafespaces/v1/*_types.go,"
            echo "then run 'go run ./cmd/crd-doc-gen -w'."
            exit 1
          fi

      - name: Verify Helm values docs match values.yaml
        run: |
          go run ./cmd/helm-values-gen -w
          if ! git diff --exit-code docs/reference/helm-values.md; then
            echo ""
            echo "Helm values docs are out of sync with helm/values.yaml."
            echo "To fix: update the comments in helm/values.yaml, re-run"
            echo "'go run ./cmd/helm-values-gen -w', and verify the output."
            echo "Or manually update docs/reference/helm-values.md to match."
            exit 1
          fi

  build-deploy:
    name: Build MkDocs + deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for git-revision-date-localized

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material + plugins
        run: |
          pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Clone gh-pages
        run: |
          cd "$RUNNER_TEMP"
          git clone --branch gh-pages --depth 1 \
            https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages
          # Preserve chart artifacts at root; we'll only overwrite docs files.

      - name: Sync site to gh-pages
        run: |
          SRC="$GITHUB_WORKSPACE/site"
          DST="$RUNNER_TEMP/gh-pages"

          # Preserve chart artifacts and Pages config. Anything else is
          # docs-site output from a previous run and can be regenerated,
          # so it's safe to delete before re-copying.
          #
          # Allowlist (NOT deleted):
          #   .git/                  — branch internals
          #   index.yaml             — Helm chart index
          #   *.tgz                  — Helm chart packages
          #   checksums.txt          — relay binary checksums
          #   CNAME                  — Pages custom domain (if ever set)
          #   .nojekyll              — Pages raw-file opt-out (if ever set)
          cd "$DST"
          find . -type f \
            ! -path './.git/*' \
            ! -name 'index.yaml' \
            ! -name '*.tgz' \
            ! -name 'checksums.txt' \
            ! -name 'CNAME' \
            ! -name '.nojekyll' \
            -delete

          # Copy new build output in.
          cp -a "$SRC/." "$DST/"

      - name: Commit + push
        run: |
          cd "$RUNNER_TEMP/gh-pages"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "docs: rebuild site from ${{ github.sha }}"
            git push origin gh-pages
          fi
