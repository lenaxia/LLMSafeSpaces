name: Worklog Renumbering

# Post-merge worklog renumbering bot. Two triggers:
#
#   push to main:    fast path — renumbers NNNN_ sentinels immediately after
#                    every merge. The original location was inside ci.yml,
#                    which meant a PR merge commit containing [skip ci]
#                    (used by docs-only PRs to save CI minutes) bypassed
#                    the bot entirely. Worklog 0552 documents the
#                    incident: PR #414 used [skip ci] and the worklog
#                    NNNN_2026-06-26_provider-not-found-end-to-end.md
#                    sat unnumbered on main for hours, breaking
#                    TestLive_Worklogs_NoDuplicates for every downstream
#                    PR. By extracting to a dedicated workflow file we
#                    keep the fast path AND gain the schedule trigger
#                    below as a self-healing safety net.
#
#   schedule:        every 6 hours — catch-up pass for any push that
#                    bypassed the fast path (e.g. [skip ci] in a docs-
#                    only merge, GitHub Actions outage, or a workflow
#                    file edit that temporarily disabled this trigger).
#                    Idempotent: when no sentinels exist, the bot runs
#                    ./bin/repolint, sees no renames needed, and exits
#                    without committing. Cost: ~30s of runner time per
#                    cron tick.
#
#   workflow_dispatch: manual trigger for operators (rare).
#
# Race safety: same as the original embedded version — GitHub serializes
# merge commits, so each run sees the previous run's renumbered state,
# and the [skip ci] in the auto-commit message prevents an infinite
# loop. Two simultaneous merges would each tick the bot; the second
# would see the first's renumbered tree and assign the next number.

on:
  push:
    branches: [main]
    paths:
      - 'worklogs/**'
  schedule:
    # Every 6 hours at minute 17. Offset from :00 to avoid the
    # GitHub-Actions cron-storm at the top of each hour.
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renumber:
    name: Assign worklog numbers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Build repolint
        run: make repolint-build

      - name: Assign numbers to NNNN_ worklogs and fix collisions
        id: autofix
        run: |
          # Capture the PR number from the CURRENT HEAD (the merge commit)
          # before we commit any renames below. After the commit+push, HEAD
          # becomes the bot's own commit ("chore(repolint): ..."), which has
          # no PR number. On the cron path the HEAD may already be the bot's
          # own previous commit, so PR_NUM will be empty — the comment step
          # tolerates that.
          PR_NUM=$(git log -1 --pretty=%B | grep -oE '#[0-9]+' | tail -1 | tr -d '#')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"

          OUTPUT=$(./bin/repolint -fix-worklogs-only 2>&1) || true
          echo "$OUTPUT"
          # Capture rename lines for the PR comment. Format:
          #   fix-worklogs: renamed NNNN_2026-06-22_foo.md → 0544_2026-06-22_foo.md
          RENAMES=$(echo "$OUTPUT" | grep '^fix-worklogs: renamed ' || true)
          if [ -z "$RENAMES" ]; then
            echo "No NNNN_ sentinels or collisions — nothing to rename"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Save renames to a file for the comment step (multiline safe).
            echo "$RENAMES" > /tmp/renames.txt
          fi

      - name: Commit and push if changed
        if: steps.autofix.outputs.changed == 'true'
        run: |
          echo "Worklog numbering applied:"
          git --no-pager diff --stat -- worklogs/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worklogs/
          # [skip ci] keeps this commit from triggering the broader CI
          # workflow. The renumbering workflow itself is path-filtered to
          # worklogs/** so the auto-commit would still queue it, but the
          # cron trigger handles the next pass anyway — and the no-rename
          # idempotent exit keeps it cheap.
          git commit -m "chore(repolint): assign worklog numbers [skip ci]"
          git push

      - name: Comment assigned numbers on merged PR
        if: steps.autofix.outputs.changed == 'true' && steps.autofix.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.autofix.outputs.pr_num }}"

          # Build the comment body using a heredoc to avoid quote-nesting issues.
          {
            echo "## Worklog numbers assigned"
            echo ""
            echo "The post-merge bot assigned the following worklog number(s):"
            echo ""
            while IFS= read -r line; do
              # Extract the target filename from "fix-worklogs: renamed SRC → TARGET"
              TARGET=$(echo "$line" | sed 's/.*→ //')
              echo "- \`$TARGET\`"
            done < /tmp/renames.txt
          } > /tmp/full-comment.md

          gh pr comment "$PR_NUM" --body-file /tmp/full-comment.md
