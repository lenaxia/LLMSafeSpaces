name: Secrets Integration

# Runs the secrets-management integration suite against real Postgres
# + Redis service containers. The unit tests in pkg/secrets already
# run on every PR via .github/workflows/ci.yml's `test` job (with
# -short), but the build-tagged integration tests
# (pg_integration_test.go, redis_masterkey_e2e_test.go) require live
# infrastructure and were not running anywhere until this workflow.
#
# Without this gate, every Postgres-backed code path (PgSecretStore,
# PgKeyStore, AsyncAuditLogger, the rotate-key/AddBindings/advisory-
# lock semantics) had ZERO automated coverage. Live cluster validation
# of pass-1..6 surfaced exactly this risk: a missing migration in
# the deployed DB caused a real workspaceOwnerVerifier failure that
# would have been caught here.
#
# Why a separate workflow rather than a job in ci.yml: the ci.yml
# file is currently being heavily edited for lint + chart work;
# isolating the secrets gate here keeps the diffs small and reduces
# merge-conflict surface. The two workflows can be merged later.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pkg-secrets-integration:
    name: pkg/secrets integration (Postgres + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: llmsafespaces
          POSTGRES_PASSWORD: integration-test
          POSTGRES_DB: llmsafespaces
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmsafespaces"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # pkg/secrets integration tests read these. See
      # pkg/secrets/pg_integration_test.go and
      # pkg/secrets/redis_masterkey_e2e_test.go for the env contract.
      TEST_DATABASE_URL: "postgres://llmsafespaces:integration-test@localhost:5432/llmsafespaces?sslmode=disable"
      TEST_REDIS_ADDR: "localhost:6379"
      # api/internal/services/database and api/internal/testharness integration
      # tests both read TEST_DATABASE_URL via the shared harness
      # (api/internal/testharness), which applies migrations idempotently.

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      # Apply schema migrations in order. The integration tests assume
      # the live schema; a missing migration produces opaque "column
      # does not exist" errors at runtime exactly like the cluster
      # drift we hit during pass-6 live validation.
      - name: Apply Postgres migrations
        env:
          PGPASSWORD: integration-test
        run: |
          set -euo pipefail
          for f in api/migrations/*.up.sql; do
            echo "applying $f"
            psql -h localhost -U llmsafespaces -d llmsafespaces -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run -tags=integration tests for pkg/secrets
        run: |
          go test -timeout 180s -race -tags=integration \
            -count=1 \
            ./pkg/secrets/...

      - name: Run unit tests for pkg/secrets with race detector
        # The default ci.yml `test` job runs -short on the whole tree;
        # this re-runs pkg/secrets without -short so any test that
        # opted out of -short (none today, but future-proofing) is
        # still exercised here.
        run: |
          go test -timeout 120s -race -count=1 ./pkg/secrets/...

      - name: Run -tags=integration tests for api/internal/services/database
        # Real-driver coverage for the credential_sets table and any
        # other database/sql ↔ Postgres-array path. The unit tests for
        # this package use go-sqlmock which does NOT enforce native
        # array decoding — that gap is exactly what allowed the
        # `unsupported Scan ... type *[]string` bug to ship to prod
        # (worklog 0130). Run only the integration-tagged tests; the
        # default unit tests already run in the ci.yml `test` job.
        run: |
          go test -timeout 120s -race -tags=integration \
            -count=1 \
            ./api/internal/services/database/...

      - name: Run -tags=integration tests for api/internal/testharness
        # The harness's own contract tests: Reset()/Seed()/migrations/
        # teardown/parallel-isolation invariants. Without this step those
        # protections had zero CI coverage. This job already provisions the
        # Postgres + Redis services and TEST_DATABASE_URL the harness reads.
        run: |
          go test -timeout 120s -race -tags=integration \
            -count=1 \
            ./api/internal/testharness/...
