    description: 'Kubernetes-first platform for running AI agents securely in isolated
      workspaces. Each workspace runs `opencode serve` as a persistent HTTP server
      with a PVC-backed workspace. The API service acts as a reverse proxy to the
      agent. GitOps note: the chart is consumed from a Git source, not published to
      a Helm/OCI registry — when deploying via FluxCD GitRepository, set `reconcileStrategy:
      Revision` or the chart is packaged once and never refreshed between releases
      (see charts/llmsafespaces/README.md, #456). '
