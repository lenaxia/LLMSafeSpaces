{{- if .Values.networkPolicy.enabled }}
# Epic 17 G16: Default-deny ingress for sandbox workspace pods.
#
# Without this, any pod in the cluster — including other tenants'
# workspaces and any user-controlled pods in the same namespace — can
# initiate connections to a sandbox pod. That breaks the multi-tenant
# trust model: agent state, opencode SSE streams, and the agentd HTTP
# API would all be reachable cross-tenant.
#
# Allowances:
#   - The API server pod (proxy) can reach sandbox pods on agentd port
#     4097 and opencode port 4096. The selector is configurable via
#     .networkPolicy.apiPodLabelSelector to support deployments where
#     the API server runs in a different namespace.
#   - Kubelet probes and the controller target the agentd admin port
#     4098 (US-22.8 mux split). This port is also allowed from the API
#     server selector since the controller runs in the same namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-workspace-default-deny-ingress
  namespace: {{ include "llmsafespaces.workspaceNamespace" . }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace-network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "llmsafespaces.workspacePodSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # API server pod → workspace pod (4096/4097/4098). The API
    # proxies user requests to opencode (4096) and agentd (4097).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 4096
        - protocol: TCP
          port: 4097
        - protocol: TCP
          port: 4098
    # Controller pod → workspace pod admin port (4098 only). The
    # controller polls /v1/healthz on a 15s interval to drive its
    # ConsecutiveHealthFailures pod-restart decision (Epic 22 US-22.5)
    # and /v1/statusz on a 60s deep-status cadence (US-22.6). Without
    # this rule the controller's probes time out, threshold trips, the
    # controller kills the pod, recreates it, and the cycle repeats —
    # the workspace never reaches Active for long.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.controllerPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 4098
    {{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitors.enabled .Values.monitoring.serviceMonitors.agentdPodMonitor.enabled }}
    # Prometheus pod → workspace pod admin port (4098 only). Required so
    # the PodMonitor (podmonitor-agentd.yaml) can scrape /metrics for
    # US-44.8 ops gauges (workspace_restarts_total, workspace_memory_bytes,
    # workspace_active_sessions, workspace_context_tokens, workspace_oom_kills_total).
    # The /metrics endpoint is unauthenticated; this NetworkPolicy rule is
    # the sole network-layer control on who can read it.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ default .Release.Namespace .Values.networkPolicy.prometheusNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.prometheusPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 4098
    {{- end }}
---
{{- $workspaceEgressEnabled := true -}}
{{- if hasKey .Values.networkPolicy "workspaceEgress" -}}
  {{- if hasKey .Values.networkPolicy.workspaceEgress "enabled" -}}
    {{- $workspaceEgressEnabled = .Values.networkPolicy.workspaceEgress.enabled -}}
  {{- end -}}
{{- end -}}
{{- if and .Values.networkPolicy.enabled $workspaceEgressEnabled }}
# Epic 17 G16: Workspace egress allow-list.
#
# Sandbox pods need:
#   - DNS resolution (otherwise nothing else can connect by name)
#   - Egress to LLM endpoints and operator-allowlisted CIDRs
#
# The policy explicitly forbids egress to:
#   - kube-apiserver and other in-cluster services (via blockedEgressCIDRs)
#   - cloud metadata endpoint (169.254.169.254)
# A hostile agent in a sandbox can still reach the public internet via the
# allowed CIDRs; that's accepted risk per threat-model §4.4.
#
# WHEN TO DISABLE (networkPolicy.workspaceEgress.enabled: false):
#   Operators using a CNI-native policy engine (Cilium CNP, Calico
#   GlobalNetworkPolicy, etc.) that can enforce a strict FQDN allowlist
#   should disable this default egress NP — otherwise the two policies
#   are unioned by the CNI and the effective allow-set widens to
#   whatever this template permits (default: 0.0.0.0/0 minus RFC1918).
#   With this disabled AND no CNP in place, workspace pods have
#   default-deny egress (from the ingress policy above's implicit
#   policyType coverage, plus the network layer's fail-closed default).
#   Threat model A2 still requires SOMETHING enforcing egress — do not
#   set this false without a replacement in place.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-workspace-egress
  namespace: {{ include "llmsafespaces.workspaceNamespace" . }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace-network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "llmsafespaces.workspacePodSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS — required for any external host resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dnsPodLabelSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Epic 26: Relay egress — workspace pods must connect back to the API
    # service WebSocket relay endpoint (/api/v1/workspaces/:id/relay?role=agentd).
    # Pod-selector based (not CIDR) so it works regardless of ClusterIP range.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiPodLabelSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port }}
    {{- if .Values.controller.inferenceRelay.enabled }}
    # Epic 42: In-cluster relay-router egress. The agentd reads
    # INFERENCE_RELAY_BASEURL pointing at the router's ClusterIP, which
    # falls under the RFC1918 exclude in the general-egress rule below.
    # Without an explicit pod-selector allow, the agentd cannot reach the
    # router and free-model inference requests fail. Discovered during
    # worklog 0467 in-cluster testing.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
    # External egress: allowedEgressCIDRs minus blockedEgressCIDRs.
    {{- if .Values.networkPolicy.allowedEgressCIDRs }}
    - to:
        {{- range .Values.networkPolicy.allowedEgressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
            {{- with $.Values.networkPolicy.blockedEgressCIDRs }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
