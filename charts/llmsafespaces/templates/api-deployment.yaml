{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmsafespaces.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "llmsafespaces.api.serviceAccountName" . }}
      {{- with .Values.api.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "llmsafespaces.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.config.server.port }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /etc/llmsafespaces/config.yaml
            - name: LLMSAFESPACES_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: postgres-password
            - name: LLMSAFESPACES_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: redis-password
                  optional: true
            - name: LLMSAFESPACES_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: jwt-secret
            {{/* US-50.1: the master KEK is delivered as a read-only file mount by
                   default (masterSecret.deliveryMethod=file) so it never appears in
                   /proc/1/environ. Setting masterSecret.deliveryMethod=env restores
                   the legacy env-var block for non-Helm/back-compat deployments. */}}
            {{- if eq (default "file" .Values.masterSecret.deliveryMethod) "env" }}
            - name: LLMSAFESPACES_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: master-secret
            {{- else }}
            - name: LLMSAFESPACES_MASTER_SECRET_FILE
              value: {{ default "/var/run/secrets/llmsafespaces/master-secret" .Values.masterSecret.fileMountPath | quote }}
            {{- end }}
            {{/* F5 (worklog 0372): shared secret the controller presents as
                   X-Internal-Token to authenticate internal org-status polls.
                   The endpoint FAILS CLOSED without it, so it is always wired
                   (same non-optional posture as jwt/master secrets). */}}
            - name: LLMSAFESPACES_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: internal-token
            - name: LLMSAFESPACES_KUBERNETES_PODNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LLMSAFESPACES_KUBERNETES_PODNAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.inferenceRelayURL }}
            - name: LLMSAFESPACES_SERVER_INFERENCERELAYURL
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.turnstile.enabled }}
            # Turnstile (US-63.x) — enables the /register CAPTCHA middleware
            # in the API. The secret key is loaded via valueFrom.secretKeyRef
            # so it never lands in a rendered ConfigMap / pod spec dump.
            # When TURNSTILE_ENABLED is empty/unset the middleware is a no-op,
            # matching turnstile.enabled=false chart-side.
            - name: LLMSAFESPACES_TURNSTILE_ENABLED
              value: "true"
            - name: LLMSAFESPACES_TURNSTILE_SECRETKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.turnstile.secretKey.existingSecret | quote }}
                  key: {{ .Values.turnstile.secretKey.key | quote }}
            - name: LLMSAFESPACES_TURNSTILE_VERIFYURL
              value: {{ .Values.turnstile.verifyURL | quote }}
            {{- end }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llmsafespaces
              readOnly: true
            {{- if ne (default "file" .Values.masterSecret.deliveryMethod) "env" }}
            - name: master-secret
              mountPath: {{ default "/var/run/secrets/llmsafespaces/master-secret" .Values.masterSecret.fileMountPath }}
              subPath: master-secret
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "llmsafespaces.fullname" . }}-api-config
        {{- if ne (default "file" .Values.masterSecret.deliveryMethod) "env" }}
        - name: master-secret
          secret:
            secretName: {{ include "llmsafespaces.secretName" . }}
            items:
              - key: master-secret
                path: master-secret
            defaultMode: 0440
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
