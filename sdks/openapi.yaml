            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
components:
  parameters:
    WorkspaceId:
      name: id
      in: path
      required: true
      description: Workspace ID
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      description: Session ID
      schema:
        type: string
    SecretId:
      name: id
      in: path
      required: true
      description: Secret ID
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict (duplicate resource)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /auth/login or /auth/register
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "lsp_ prefixed API key in Bearer format (e.g. Bearer lsp_abc123...)"
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    AuthConfig:
      type: object
      properties:
        registrationEnabled:
          type: boolean
        oidcEnabled:
          type: boolean
        ssoProviders:
          type: array
          items:
            type: string
        instanceName:
          type: string
        motd:
          type: string
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        active:
          type: boolean
        role:
          type: string
    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Full key value (only returned on creation)
        prefix:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        userId:
          type: string
        runtime:
          type: string
        storageSize:
          type: string
        phase:
          type: string
          enum: [Pending, Active, Suspending, Suspended, Resuming, Terminating, Terminated, Failed]
        pvcName:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        runtime:
          type: string
        storageSize:
          type: string
        storageClass:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
    WorkspaceListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceListItem"
        pagination:
          $ref: "#/components/schemas/PaginationMetadata"
    WorkspaceListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        userId:
          type: string
        runtime:
          type: string
        storageSize:
          type: string
        phase:
          type: string
        maxActiveSessions:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        start:
          type: integer
        end:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    WorkspaceStatusResult:
      type: object
      properties:
        phase:
          type: string
        pvcName:
          type: string
        activeSessions:
          type: integer
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceConditionResult"
        credentialState:
          $ref: "#/components/schemas/CredentialStateResult"
        agentHealth:
          $ref: "#/components/schemas/AgentHealthResult"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionStatusItem"
        diskUsedBytes:
          type: integer
          format: int64
        diskTotalBytes:
          type: integer
          format: int64
    WorkspaceConditionResult:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        reason:
          type: string
        message:
          type: string
    CredentialStateResult:
      type: object
      properties:
        available:
          type: boolean
        reason:
          type: string
        message:
          type: string
    AgentHealthResult:
      type: object
      properties:
        status:
          type: string
        providersConfigured:
          type: integer
        agentVersion:
          type: string
        connected:
          type: array
          items:
            type: string
        message:
          type: string
        lastCheckedAt:
          type: string
    SessionStatusItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
    ActivateWorkspaceResponse:
      type: object
      properties:
        resumed:
          type: string
          description: ID of the workspace that was resumed
        suspended:
          type: string
          description: ID of the workspace that was suspended to make room (if any)
    RefreshWorkspaceResult:
      type: object
      properties:
        restartGeneration:
          type: integer
          format: int64
          description: The bumped restart generation that triggers a pod rebuild (re-resolves the runtime image to its latest version and applies refreshed resource requests)
    TerminalTicketResponse:
      type: object
      properties:
        ticket:
          type: string
          description: One-time ticket (prefixed with tkt_)
        expiresAt:
          type: string
          format: date-time
          description: Ticket expiry time (30s from creation)
    EnsureSessionResponse:
      type: object
      properties:
        workspaceId:
          type: string
        workspacePhase:
          type: string
        sessionId:
          type: string
        resumed:
          type: boolean
    SessionListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        messageCount:
          type: integer
        status:
          type: string
          enum: [active, idle]
    ActiveSessionsResponse:
      type: object
      properties:
        active:
          type: array
          items:
            type: string
        maxActive:
          type: integer
    MessageResponse:
      type: object
      description: Response from opencode agent (schema tracks upstream opencode version)
      x-opencode-proxy: true
      properties:
        info:
          type: object
          description: Message metadata
        parts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              content:
                type: string
    CreateSecretRequest:
      type: object
      required: [name, type, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '^[a-z0-9._-]+$'
          description: Lowercase alphanumeric, dots, underscores, hyphens only. Must not start with dot or hyphen.
        type:
          type: string
          enum: [llm-provider, ssh-key, git-credential, secret-file, env-secret]
        value:
          type: string
          description: Plaintext value (encrypted before storage)
        metadata:
          type: object
          description: Arbitrary metadata JSON
    UpdateSecretRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
        metadata:
          type: object
    SecretResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [llm-provider, ssh-key, git-credential, secret-file, env-secret]
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SecretBinding:
      type: object
      properties:
        secretId:
          type: string
        workspaceId:
          type: string
        createdAt:
          type: string
          format: date-time
    SetBindingsRequest:
      type: object
      required: [secretIds]
      properties:
        secretIds:
          type: array
          items:
            type: string
    BindingsResponse:
      type: object
      properties:
        bindings:
          type: array
          items:
            $ref: "#/components/schemas/BoundSecret"
    BoundSecret:
      type: object
      properties:
        secretId:
          type: string
        name:
          type: string
        type:
          type: string
    AuditEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        action:
          type: string
        secretId:
          type: string
          nullable: true
        workspaceId:
          type: string
          nullable: true
        metadata:
          type: object
        timestamp:
          type: string
          format: date-time
    SettingsResponse:
      type: object
      properties:
        settings:
          type: object
          additionalProperties: true
        schemaVersion:
          type: string
    SettingsSchemaResponse:
      type: object
      properties:
        schemaVersion:
          type: string
        settings:
          type: array
          items:
            type: object
            description: Setting definition with key, type, default, description
    # --- US-62.1: New schemas ---
    QueuedMessage:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        session_id:
          type: string
        workspace_id:
          type: string
        enqueued_at:
          type: string
          format: date-time
        retry_count:
          type: integer
    ModelListResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelItem"
        currentModel:
          type: string
    ModelItem:
      type: object
      properties:
        id:
          type: string
        providerID:
          type: string
        name:
          type: string
        enabled:
          type: boolean
