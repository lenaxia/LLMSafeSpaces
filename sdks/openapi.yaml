        "401":
          $ref: "#/components/responses/Unauthorized"
  # --- Auth Lifecycle (Epics 49, 54, 56) ---
  /auth/password-reset/request:
    post:
      tags: [auth]
      summary: Request a password reset email
      description: |
        Always returns 202 regardless of whether the email exists
        (enumeration-safe). The reset token is sent via email.
      security: []
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Reset email sent (or would be sent if the email exists)
  /auth/password-reset/confirm:
    post:
      tags: [auth]
      summary: Confirm a password reset with a token
      security: []
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset successful
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/verify-email:
    post:
      tags: [auth]
      summary: Verify email with a token
      security: []
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/verify-email/resend:
    post:
      tags: [auth]
      summary: Resend email verification
      security: []
      operationId: resendEmailVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification email resent (or would be sent)
  /auth/lookup:
    post:
      tags: [auth]
      summary: Email-led login discovery (enumeration-safe)
      description: |
        Resolves an email to a redirect URL pointing at the user's org.
        Always returns 200 with { redirectUrl } on valid input; DB errors masked.
      security: []
      operationId: lookupEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Redirect URL (may be the default login if no org)
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirectUrl:
                    type: string
  /auth/unlock-dek:
    post:
      tags: [auth]
      summary: Unlock the user DEK with a password
      description: |
        Soft-unlock endpoint for Epic 56 (durable DEK session). Registered under
        /auth/, not /account/. Unlocks the DEK when the session has a valid JWT
        but the DEK is not yet unlocked (post-restart scenario).
      operationId: unlockDek
      x-feature-gated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: DEK unlocked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
