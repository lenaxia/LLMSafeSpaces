openapi: "3.0.3"
info:
  title: LLMSafeSpaces API
  description: |
    LLMSafeSpaces is a Kubernetes-first platform for running AI agents securely in isolated sandboxes.
    Every sandbox runs `opencode serve` as a persistent HTTP server with a PVC-backed persistent workspace.
  version: "1.1.0"
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /api/v1
    description: API v1 base path
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: auth
    description: Authentication and API key management
  - name: workspaces
    description: Workspace lifecycle management
  - name: sessions
    description: Session management and proxy
  - name: secrets
    description: Secret management (Epic 10)
  - name: settings
    description: Admin and user settings
  - name: credentials
    description: Provider credentials, agent roles, and prompts
  - name: usage
    description: Usage metering and quota (feature-gated)
  - name: account
    description: Account management (key rotation, password)
  - name: health
    description: Health and readiness probes
paths:
  # --- Auth ---
  /auth/config:
    get:
      tags: [auth]
      summary: Get auth configuration
      description: Public endpoint returning feature flags (registration enabled, OIDC, instance name).
      security: []
      operationId: getAuthConfig
      responses:
        "200":
          description: Auth configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (clears session cookie)
      security: []
      operationId: logout
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      tags: [auth]
      summary: Get current user info
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/api-keys:
    post:
      tags: [auth]
      summary: Create an API key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created (secret returned only on creation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [auth]
      summary: List API keys
      operationId: listApiKeys
      responses:
        "200":
          description: List of API keys (secrets stripped)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/api-keys/{id}:
    delete:
      tags: [auth]
      summary: Delete an API key
      operationId: deleteApiKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: API key deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
  # --- Workspaces ---
  /workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [workspaces]
      summary: Create a workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /workspaces/{id}:
    get:
      tags: [workspaces]
      summary: Get a workspace
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [workspaces]
      summary: Rename a workspace
      operationId: renameWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "204":
          description: Workspace renamed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [workspaces]
      summary: Delete a workspace
      operationId: deleteWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "204":
          description: Workspace deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/status:
    get:
      tags: [workspaces]
      summary: Get workspace status
      operationId: getWorkspaceStatus
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStatusResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/activate:
    post:
      tags: [workspaces]
      summary: Activate a workspace (resume if suspended, suspend others if at limit)
      operationId: activateWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateWorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/suspend:
    post:
      tags: [workspaces]
      summary: Suspend a workspace (pod deleted, PVC retained)
      operationId: suspendWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "202":
          description: Suspend initiated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/refresh-compute:
    post:
      tags: [workspaces]
      summary: Refresh workspace compute (re-sync resource defaults and rebuild pod for latest image version)
      operationId: refreshWorkspaceCompute
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "202":
          description: Refresh initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshWorkspaceResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/restart:
    post:
      tags: [workspaces]
      summary: Restart a workspace (bumps restartGeneration, controller rebuilds the pod)
      description: |
        Declarative recovery from Failed phase or force-restart from Active.
        Idempotent at the spec layer — bumps spec.restartGeneration so the
        controller observes the change and transitions back through Pending.
      operationId: restartWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "202":
          description: Restart initiated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/agent/reload:
    post:
      tags: [workspaces]
      summary: Reload the agent process without restarting the pod
      description: |
        Disposes the current opencode process and starts a fresh one, re-reading
        agent-config.json. Useful for picking up credential changes without a
        full pod restart (~22s). The workspace stays Active throughout.
      operationId: reloadAgent
      x-feature-gated: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "202":
          description: Agent reload initiated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/models:
    get:
      tags: [workspaces]
      summary: List available models for a workspace
      operationId: listWorkspaceModels
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/model:
    put:
      tags: [workspaces]
      summary: Set the workspace's default model
      operationId: setWorkspaceModel
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                  description: Model ID (e.g. "claude-sonnet-4-20250514")
      responses:
        "204":
          description: Model set
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/prompt:
    get:
      tags: [workspaces]
      summary: Get the workspace-level system prompt override
      operationId: getWorkspacePrompt
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace prompt
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [workspaces]
      summary: Set the workspace-level system prompt override
      operationId: setWorkspacePrompt
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
      responses:
        "204":
          description: Prompt set
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/agent-role:
    get:
      tags: [workspaces]
      summary: Get the workspace's assigned agent role
      operationId: getWorkspaceRole
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Agent role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [workspaces]
      summary: Set the workspace's agent role
      operationId: setWorkspaceRole
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleId]
              properties:
                roleId:
                  type: string
      responses:
        "204":
          description: Role set
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [workspaces]
      summary: Clear the workspace's agent role (inherit from org/platform)
      operationId: clearWorkspaceRole
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "204":
          description: Role cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/effective-agent-role:
    get:
      tags: [workspaces]
      summary: Get the effective agent role with inheritance chain
      operationId: getEffectiveWorkspaceRole
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Effective agent role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveAgentRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  # --- Sessions ---
  /workspaces/{id}/sessions:
    get:
      tags: [sessions]
      summary: List workspace sessions
      operationId: listSessions
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/new:
    post:
      tags: [sessions]
      summary: Create a new session (ensures workspace is active)
      operationId: createSession
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Session created or resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnsureSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/active:
    get:
      tags: [sessions]
      summary: Get active sessions for a workspace
      operationId: getActiveSessions
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /workspaces/{id}/sessions/{sessionId}/title:
    put:
      tags: [sessions]
      summary: Rename a session
      operationId: renameSession
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        "204":
          description: Session renamed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  # --- Proxy (to opencode serve) ---
  /workspaces/{id}/sessions/{sessionId}/message:
    post:
      tags: [sessions]
      summary: Send a message to the agent (synchronous — blocks until LLM responds)
      description: |
        Proxies to opencode's `POST /session/:id/message`. Blocks until the LLM
        produces a complete response. For long prompts, consider using the async
        prompt endpoint instead.
      operationId: sendMessage
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
        - name: verbose
          in: query
          description: If true, include patch parts in response
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: The message text to send to the agent
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [sessions]
      summary: Get message history for a session
      operationId: getHistory
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
        - name: verbose
          in: query
          description: If true, include patch parts in response
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/{sessionId}/prompt:
    post:
      tags: [sessions]
      summary: Send an async prompt (returns immediately, results via SSE)
      operationId: sendPromptAsync
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "202":
          description: Prompt accepted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: Get session details
      operationId: getSession
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session details from opencode
          content:
            application/json:
              schema:
                type: object
                description: Opencode session object (schema tracks upstream)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [sessions]
      summary: Delete a session and its children
      description: |
        Deletes a session by proxying DELETE /session/:id to the workspace's
        opencode agent. The session and all child sessions are removed from
        both opencode and the session_index. After a successful delete, an SSE
        `session.status` event with `status: "deleted"` is published for
        multi-tab consistency.
      operationId: deleteSession
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session deleted successfully
        "400":
          description: Invalid session ID (path traversal characters)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Workspace is not active (suspended or transitioning)
  /workspaces/{id}/sessions/{sessionId}/abort:
    post:
      tags: [sessions]
      summary: Abort the current agent operation
      operationId: abortSession
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Abort acknowledged
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/{sessionId}/queue:
    post:
      tags: [sessions]
      summary: Enqueue a message for a busy session
      description: |
        When the session is busy (processing a turn), the message is queued in Redis
        and drained automatically once the session goes idle. If the session is
        already idle, the message is sent immediately. Returns a queue message ID.
      operationId: enqueueMessage
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 100000
                  description: Message text to enqueue
      responses:
        "202":
          description: Message enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageID:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [sessions]
      summary: List queued messages for a session
      operationId: listQueue
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Queued messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/QueuedMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/{sessionId}/queue/{messageId}:
    delete:
      tags: [sessions]
      summary: Dismiss a queued message
      operationId: dismissQueuedMessage
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Message dismissed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/sessions/{sessionId}/seen:
    put:
      tags: [sessions]
      summary: Mark a session as seen (clears unread state)
      operationId: markSessionSeen
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Session marked as seen
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /workspaces/{id}/session-events:
    get:
      tags: [sessions]
      summary: SSE event stream from the workspace agent
      description: |
        Server-Sent Events stream. Not usable by generated SDK clients — use
        language-specific SSE libraries (EventSource in browsers, httpx-sse in Python, etc.).
        Content-Type: text/event-stream.
      operationId: streamEvents
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "Newline-delimited SSE events"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  # --- Agent Input Requests (Epic 16) ---
  /workspaces/{id}/question:
    get:
      tags: [sessions]
      summary: List pending questions from the agent
      description: |
        Proxies to the workspace pod. Questions originate from the agent
        (opencode) when it needs user input. Response schema tracks upstream.
      operationId: listQuestions
      x-opencode-proxy: true
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Pending questions
          content:
