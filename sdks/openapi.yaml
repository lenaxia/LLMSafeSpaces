  # --- Terminal ---
  /workspaces/{id}/terminal/ticket:
    post:
      tags: [workspaces]
      summary: Request a one-time terminal ticket
      description: |
        Returns a short-lived (30s) single-use ticket for WebSocket terminal upgrade.
        The ticket is tied to the workspace ID and authenticated user.
      operationId: requestTerminalTicket
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Terminal ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminalTicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Workspace not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /workspaces/{id}/terminal:
    get:
      tags: [workspaces]
      summary: WebSocket terminal connection
      description: |
        Upgrades to WebSocket using a one-time ticket (from POST /terminal/ticket).
        No Authorization header needed — auth is via the ticket query parameter.
        Messages are JSON-framed: input, resize, output, exit, error.
      security: []
      operationId: connectTerminal
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: ticket
          in: query
          required: true
          description: One-time ticket from POST /terminal/ticket
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade successful
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Terminal connection limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
