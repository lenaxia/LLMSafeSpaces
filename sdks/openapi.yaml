  # --- Probe Models (anonymous) ---
  /probe-models:
    post:
      tags: [credentials]
      summary: Probe available models with raw credentials (not stored)
      description: |
        Accepts apiKey + baseURL directly and probes the provider for available
        models without creating a stored credential. Auth still required.
        baseURL is SSRF-validated before any outbound request.
      operationId: probeModelsAnon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeModelsRequest"
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
