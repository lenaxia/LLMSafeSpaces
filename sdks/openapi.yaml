              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  failures:
                    type: array
                    items:
                      type: string
