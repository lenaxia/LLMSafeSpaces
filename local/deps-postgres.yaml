---
# G26 (Epic 17 worklog 0089 RT-4.5): postgres credentials are read from
# the same Secret (`llmsafespaces-credentials`) that the API and migration
# Job consume. The chart's secret.yaml auto-generates a 32-char random
# password on first install and reuses the existing one across upgrades
# via `lookup`, so this manifest never needs to know the password value.
#
# To bootstrap the live cluster after the chart fix:
#   1. helm upgrade llmsafespaces ./helm -n default --reuse-values
#      (this regenerates llmsafespaces-credentials with random values)
#   2. kubectl -n default rollout restart deploy/postgres
#      (forces postgres to pick up the new env-from)
#   3. kubectl -n default delete pvc postgres-data; kubectl apply -f local/deps-postgres.yaml
#      (only needed if the postgres data dir was bootstrapped with the old
#      'changeme' superuser password — postgres init runs only on empty
#      data directories so a password change requires a re-init OR an
#      ALTER USER inside the running pod)
#
# For multi-tenant production, prefer CloudNativePG / Bitnami postgresql
# chart / cloud-managed Postgres; see helm/README.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: llmsafespaces
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llmsafespaces-credentials
                  key: postgres-password
            - name: POSTGRES_DB
              value: llmsafespaces
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "llmsafespaces"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
