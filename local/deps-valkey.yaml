---
# G26 (Epic 17 worklog 0089 RT-4.5): valkey REQUIRES password authentication.
# The password is read from the same `llmsafespaces-credentials` Secret
# the chart generates (auto-randomised on first install). Pre-fix valkey
# ran with `requirepass=""`, accepting unauthenticated connections from
# anywhere in the cluster.
#
# Bootstrap order (same as deps-postgres.yaml):
#   1. helm upgrade llmsafespaces ./helm -n default --reuse-values
#   2. kubectl apply -f local/deps-valkey.yaml
#   3. kubectl -n default rollout restart deploy/valkey
#
# The startup arg pulls the password from the env var (which valkey
# expands at startup); valkey 8 supports this via $VALKEY_PASSWORD-style
# expansion or via --requirepass with shell expansion. We use the latter
# wrapped in `sh -c` to keep the dependency surface minimal.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  labels:
    app: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          # `sh -c` is needed so the shell expands $REDIS_PASSWORD before
          # the valkey-server binary executes. exec keeps PID 1 as
          # valkey so signals are forwarded correctly.
          command: ["/bin/sh"]
          args:
            - "-c"
            - 'exec valkey-server --requirepass "$REDIS_PASSWORD"'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llmsafespaces-credentials
                  key: redis-password
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'valkey-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
